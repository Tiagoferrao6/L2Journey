# ---------------------------------------------------------------------------------------------------------------------------------
# Configuracoes de Rede
# Estas configuracoes fornecem controle detalhado sobre o comportamento de rede e tratamento de pacotes do servidor.
# Ajustar estes parametros pode ajudar a otimizar a performance de rede e garantir comunicacao segura entre servidor e clientes.
# ---------------------------------------------------------------------------------------------------------------------------------


# ---------------------------------------------------------------------------------------------------------------------------------
# Configuracoes Gerais de Rede
# ---------------------------------------------------------------------------------------------------------------------------------

# Tempo de Espera ao Desligar
# Tempo em segundos que o servidor espera para finalizar pacotes de envio/recebimento durante o desligamento.
# Padrao: 5 segundos
ShutdownWaitTime = 5

# Define se o descarte de pacotes esta ativado.
# Padrao: False
DropPackets = False

# Limite para Descarte de Pacotes
# Define o limite para descartar pacotes descartaveis. Valores maiores permitem mais pacotes na fila
# antes de comecar a descartar, reduzindo perda de pacotes mas usando mais memoria.
# Padrao: 250
DropPacketThreshold = 250


# ---------------------------------------------------------------------------------------------------------------------------------
# Configuracoes de ThreadPool
# ---------------------------------------------------------------------------------------------------------------------------------

# Numero de threads no pool de execucao de pacotes.
# Determina quantas threads ficam prontas para processar tarefas imediatamente.
# Se definido como 0, sera configurado automaticamente (nucleos do processador x 4).
# Mais threads processam mais tarefas ao mesmo tempo, menos threads economizam recursos.
# Padrao: 0 (auto-configurado como nucleos disponiveis x 4)
ThreadPoolSize = 4

# Nivel de prioridade das threads no pool de execucao de pacotes.
# Determina a importancia dessas threads em relacao a outros processos do sistema.
# Valores vao de 1 (menor prioridade) a 10 (maior prioridade).
# Padrao: 5 (prioridade media, adequada para uso geral)
ThreadPriority = 5


# ---------------------------------------------------------------------------------------------------------------------------------
# Configuracoes de Pool de Buffers
# ---------------------------------------------------------------------------------------------------------------------------------

# Fator inicial, tamanho e tamanho do buffer para pools pequenos, medios e grandes.
# Estes pools otimizam o uso de memoria reutilizando tamanhos de buffer comuns.

# Tamanho do Segmento de Buffer
# Tamanho dos segmentos para buffers dinamicos, usados para aumentar o tamanho conforme necessario.
# Padrao: 64
BufferSegmentSize = 64

# Permite que o pool de buffers aumente automaticamente quando atinge a capacidade maxima.
# Padrao: True
BufferPool.AutoExpandCapacity = True

# Fator Inicial
# Multiplicador para pre-inicializar os pools de buffer. Fator maior = mais buffers pre-criados.
# Padrao: 0 (sem pre-inicializacao)
BufferPool.InitFactor = 0

# Pool de Buffers Vazio
# Tamanho e tamanho do buffer para pacotes de rede vazios.
# Padrao: 100 buffers de 2 bytes cada.
BufferPool.Empty.Size = 100
BufferPool.Empty.BufferSize = 2

# Pool de Buffers Minimo
# Tamanho e tamanho do buffer para pacotes de rede de tamanho minimo.
# Padrao: 100 buffers de 64 bytes cada.
BufferPool.Minimum.Size = 100
BufferPool.Minimum.BufferSize = 64

# Pool de Buffers Muito Pequeno
# Tamanho e tamanho do buffer para pacotes de rede muito pequenos.
# Padrao: 75 buffers de 128 bytes cada.
BufferPool.VerySmall.Size = 75
BufferPool.VerySmall.BufferSize = 128

# Pool de Buffers Pequeno
# Tamanho e tamanho do buffer para pacotes de rede pequenos.
# Padrao: 75 buffers de 256 bytes cada.
BufferPool.Small.Size = 75
BufferPool.Small.BufferSize = 256

# Pool de Buffers Pequeno Grande
# Tamanho e tamanho do buffer para pacotes de rede pequenos maiores.
# Padrao: 75 buffers de 512 bytes cada.
BufferPool.LargeSmall.Size = 75
BufferPool.LargeSmall.BufferSize = 512

# Pool de Buffers Medio Pequeno
# Tamanho e tamanho do buffer para pacotes de rede medios menores.
# Padrao: 50 buffers de 1024 bytes cada.
BufferPool.SmallMedium.Size = 50
BufferPool.SmallMedium.BufferSize = 1024

# Pool de Buffers Medio
# Tamanho e tamanho do buffer para pacotes de rede medios.
# Padrao: 50 buffers de 2048 bytes cada.
BufferPool.Medium.Size = 50
BufferPool.Medium.BufferSize = 2048

# Pool de Buffers Medio Grande
# Tamanho e tamanho do buffer para pacotes de rede medios maiores.
# Padrao: 50 buffers de 4096 bytes cada.
BufferPool.LargeMedium.Size = 50
BufferPool.LargeMedium.BufferSize = 4096

# Pool de Buffers Grande Pequeno
# Tamanho e tamanho do buffer para pacotes de rede grandes menores.
# Padrao: 25 buffers de 8192 bytes cada.
BufferPool.SmallLarge.Size = 25
BufferPool.SmallLarge.BufferSize = 8192

# Pool de Buffers Grande
# Tamanho e tamanho do buffer para pacotes de rede grandes.
# Padrao: 25 buffers de 16384 bytes cada.
BufferPool.Large.Size = 25
BufferPool.Large.BufferSize = 16384

# Pool de Buffers Muito Grande
# Tamanho e tamanho do buffer para pacotes de rede muito grandes.
# Padrao: 25 buffers de 24576 bytes cada.
BufferPool.VeryLarge.Size = 25
BufferPool.VeryLarge.BufferSize = 24576

# Pool de Buffers Maximo
# Tamanho e tamanho do buffer para pacotes de rede de tamanho maximo.
# Padrao: 10 buffers de 32768 bytes cada.
BufferPool.Maximum.Size = 10
BufferPool.Maximum.BufferSize = 32768
