# ---------------------------------------------------------------------------
# Configuracoes do Servidor de Login
# ---------------------------------------------------------------------------
# Arquivo de configuracao do servidor de login. Aqui voce define as informacoes de conexao.
# Escrito considerando que voce esta atras de um roteador.
# Definicoes simplificadas...
# LAN (rede local) - computadores conectados ao mesmo roteador que voce.
# WAN (rede externa) - computadores FORA do seu roteador (ou seja, a internet).
# x.x.x.x - Formato de endereco IP. Nao inclua os "x" nas configuracoes. Use numeros reais.

# ---------------------------------------------------------------------------
# Rede
# ---------------------------------------------------------------------------

# IP de escuta do servidor de login. Use 0.0.0.0 para escutar em todos os IPs disponiveis.
# AVISO: <u><b><font color="red">Nao altere os IPs padrao se voce nao sabe o que esta fazendo!</font></b></u>
# AVISO: <u><b><font color="red">IPs externos/internos agora ficam no arquivo "ipconfig.xml".</font></b></u>
# Padrao: 0.0.0.0
LoginserverHostname = 0.0.0.0

# Padrao: 2106
LoginserverPort = 2106

# The address on which login will listen for GameServers, use * to bind on all available IPs
# WARNING: <u><b><font color="red">Please don't change default IPs here if you don't know what are you doing!</font></b></u>
# WARNING: <u><b><font color="red">External/Internal IPs are now inside "ipconfig.xml" file.</font></b></u>
# Default: 127.0.0.1
# Docker: must bind to all interfaces so other containers can connect.
LoginHostname = 0.0.0.0

# Porta onde o login escuta conexoes dos servidores de jogo.
# Padrao: 9014
LoginPort = 9014


# ---------------------------------------------------------------------------
# Configuracao de Threads
# ---------------------------------------------------------------------------

# Numero de threads no pool de tarefas agendadas.
# Se definido como -1, sera calculado automaticamente (processadores disponiveis / 2).
ScheduledThreadPoolSize = 2

# Numero de threads no pool de tarefas instantaneas.
# Se definido como -1, sera calculado automaticamente (processadores disponiveis / 2).
InstantThreadPoolSize = 2


# ---------------------------------------------------------------------------
# Seguranca
# ---------------------------------------------------------------------------

# Quantas tentativas de login invalidas antes do IP ser banido.
# Padrao: 5
LoginTryBeforeBan = 5

# Tempo (em segundos) que o IP fica bloqueado apos atingir o limite de tentativas.
# Padrao: 900 (15 minutos)
LoginBlockAfterBan = 900

# Se ativado, qualquer servidor de jogo pode se registrar nos slots livres do login.
# Padrao: True
AcceptNewGameServer = True

# Protecao contra flood de conexoes. Todos os valores sao em milissegundos.
# Padrao: True
EnableFloodProtection = True

# Padrao: 15
FastConnectionLimit = 15

# Padrao: 700
NormalConnectionTime = 700

# Padrao: 350
FastConnectionTime = 350

# Padrao: 50
MaxConnectionPerIP = 50


# ---------------------------------------------------------------------------
# Outras Configuracoes do Login
# ---------------------------------------------------------------------------

# Se desativado, a licenca (apos o login) nao sera exibida.
# Padrao: True
ShowLicence = True

# Padrao: True
AutoCreateAccounts = True

# Diretorio raiz do datapack.
# Padrao: diretorio atual de onde o servidor eh iniciado.
DatapackRoot = .


# ---------------------------------------------------------------------------
# Reinicio Agendado do Login
# ---------------------------------------------------------------------------

# Ativa ou desativa o reinicio agendado do servidor de login.
# Padrao: False
LoginRestartSchedule = False
# Tempo em horas.
# Padrao: 24
LoginRestartTime = 24
