							</tr>

							<tr><td align="left"> <font color="CDB67F">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;3. Selecione um NPC e você poderá ver sua localização no mapa.</font></td></tr>							<tr>

							</tr>

								<td height=20></td>
							</tr>
							<tr>
								<td align="center">	
									<table align=center border="0" height=250>
										%searchResult%
									</table>

										%pages%

							</tr>							
						</table>
