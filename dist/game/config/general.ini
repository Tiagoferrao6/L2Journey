# ---------------------------------------------------------------------------
# Seguranca do Servidor
# ---------------------------------------------------------------------------
# Configuracoes de log. Ativar estas opcoes aumenta significativamente a quantidade
# de dados gravados no disco. Pode impactar performance dependendo da carga do servidor.
# Use com cuidado conforme a necessidade.

# Registra no log todas as mensagens de chat dos jogadores.
# Padrao: False
LogChat = False

# Registra no log todas as transacoes de itens (coleta, troca, venda).
# Util para rastrear movimentacao de itens, mas gera muito log em servidores movimentados.
# Padrao: False
LogItems = False

# Se LogItems estiver ativado, registra apenas itens importantes (Adena e equipamentos).
# Reduz o volume de log ignorando itens comuns de pouco valor.
# Padrao: False
LogItemsSmallLog = False

# Se LogItems estiver ativado, registra apenas IDs de itens especificos (listados abaixo).
# Util para monitorar apenas itens raros ou de alto valor.
# Padrao: False
LogItemsIdsOnly = False

# IDs dos itens que serao registrados quando LogItemsIdsOnly estiver ativado.
# Separe por virgula. Exemplo: itens raros ou moeda do jogo.
# Padrao: 4356 (Gold Einhasad)
LogItemsIdsList = 4356

# Registra no log todas as tentativas de encantamento de itens (sucesso ou falha).
# Util para detectar comportamento suspeito, mas pode gerar logs grandes.
# Padrao: False
LogItemEnchants = False

# Registra no log todas as acoes de encantamento de skills (upgrades e modificacoes).
# Util para monitorar progressao de skills.
# Padrao: False
LogSkillEnchants = False

# Ativa log de auditoria para acoes de Game Masters (GMs).
# Registra todas as acoes administrativas para prestacao de contas.
# Padrao: False
GMAudit = False

# Verifica se jogadores possuem skills que nao deveriam ter.
# Padrao: False
SkillCheckEnable = True

# Se ativado, remove skills invalidas do jogador e do banco de dados.
# Se desligado, apenas reporta no log sem remover.
# Padrao: False
SkillCheckRemove = True

# Verifica tambem personagens GM (so funciona se SkillCheckEnable = True).
# Padrao: True
SkillCheckGM = False


# ---------------------------------------------------------------------------
# Otimizacao
# ---------------------------------------------------------------------------
# Gerenciamento de itens no chao.
# Permite que jogadores soltem itens no chao.
# Padrao: True
AllowDiscardItem = True

# Tempo em segundos para destruir automaticamente itens dropados no chao. 0 = Desativado.
# Padrao: 600
AutoDestroyDroppedItemAfter = 600

# Tempo em segundos para destruir automaticamente ervas (herbs) dropadas.
# Padrao: 60
AutoDestroyHerbTime = 30

# Lista de IDs de itens que NAO serao destruidos automaticamente (separados por virgula).
# Itens nesta lista ficam protegidos independente das opcoes acima.
# Padrao: 0
ListOfProtectedItems = 0

# Intervalo (em minutos) para salvar dados do jogador (localizacao, etc) no banco de dados.
# Valores maiores = menos acessos ao banco (melhor performance).
# Valores menores = dados salvos com mais frequencia (mais seguro).
# 0 = Desativa salvamento periodico. O personagem sempre e salvo ao sair do jogo.
# Padrao: 15
CharacterDataStoreInterval = 2

# Atualiza itens no banco apenas quando o personagem e salvo.
# Melhora muito a performance e reduz uso do banco de dados.
# AVISO: Pode causar perda de itens em caso de crash do servidor.
# Padrao: False
LazyItemsUpdate = False

# Quando ativado, forca a atualizacao dos itens do personagem no banco ao salvar.
# Funciona mesmo com LazyItemsUpdate ativado.
# Padrao: True
UpdateItemsOnCharStore = True

# Destroi itens diversos dropados por jogadores (todos exceto equipamentos).
# So funciona se AutoDestroyDroppedItemAfter for maior que 0.
# Padrao: False
DestroyPlayerDroppedItem = False

# Destroi equipamentos dropados por jogadores (armaduras, armas, joias).
# So funciona se DestroyPlayerDroppedItem = True.
# Padrao: False
DestroyEquipableItem = False

# Torna TODOS os itens destrutiveis.
# Se ativado, jogadores podem destruir qualquer item!
DestroyAllItems = False

# Salva itens no chao no banco de dados para restaurar apos reinicio.
# Padrao: False
SaveDroppedItem = False

# Limpa a tabela de itens salvos no chao apos carregar na memoria (seguranca).
# Se o servidor crashou antes de salvar, itens antigos serao restaurados
# e jogadores podem ja ter coletado alguns, causando duplicatas.
# Padrao: False
EmptyDroppedItemTableAfterLoad = False

# Intervalo em minutos para salvar itens no chao no banco. 0 = Desativado.
# Se desativado, itens sao salvos apenas ao desligar o servidor.
# Padrao: 60
SaveDroppedItemInterval = 60

# Deleta todos os itens salvos no chao do banco ao reiniciar.
# So funciona se SaveDroppedItem = False.
# Padrao: False
ClearDroppedItemTable = False

# Deleta quests invalidas dos jogadores.
# Padrao: False
AutoDeleteInvalidQuestData = False

# Permite criar multiplos itens nao-empilhaveis de uma vez.
# Padrao: True
MultipleItemDrop = True

# Cache de arquivos HTML.
# True = Carrega todos os HTMLs na memoria ao iniciar o servidor.
# False = Carrega HTMLs na memoria apenas quando sao solicitados pela primeira vez.
# Recomendado para servidor em producao: True
# Recomendado para desenvolvimento: False
HtmCache = False

# Verifica se arquivos HTML contem caracteres nao-ASCII.
# Padrao: True
CheckHtmlEncoding = True

# Remove automaticamente o parametro -h de bypasses de Chat e Quest.
# Evita o "piscar" da janela de dialogo ao usar bypass.
# Padrao: True
HideBypassRemoval = True

# Intervalo minimo e maximo (em segundos) para animacoes aleatorias de NPCs.
# O minimo deve ser menor ou igual ao maximo.
# Coloque 0 para desativar animacoes aleatorias.
# Padrao: 5
MinNpcAnimation = 10
# Padrao: 60
MaxNpcAnimation = 120
# Padrao: 5
MinMonsterAnimation = 10
# Padrao: 60
MaxMonsterAnimation = 60

# Opcoes de grade do mapa: grades podem ligar e desligar automaticamente.
# Isso afeta o carregamento de IA e geodata dentro daquela grade.
# Ligar uma grade com jogador e imediato. As 8 grades vizinhas
# ligam apos o tempo configurado abaixo.
# Desligar ocorre apos o tempo configurado sem jogadores na grade ou vizinhas.
# A opcao "sempre ligado" ignora tudo e mantem todas as grades ativas (nao recomendado).
# Padrao: False
GridsAlwaysOn = False

# Padrao: 1
GridNeighborTurnOnTime = 1

# Padrao: 90
GridNeighborTurnOffTime = 90

# Corrige precos de buylist e multisell quando estao abaixo do preco de venda.
# Padrao: True
CorrectPrices = True

# Limite de itens por transacao no multisell.
# Maximo permitido pelo cliente: 999999
MultisellAmountLimit = 10000


