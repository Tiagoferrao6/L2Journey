# ---------------------------------------------------------------------------
# Configuracoes do Game Server
# ---------------------------------------------------------------------------
# Endereco do Login Server ao qual este gameserver deve se conectar.
# AVISO: Nao altere os IPs padrao se voce nao souber o que esta fazendo!
# AVISO: IPs externo/interno agora ficam em "ipconfig.xml".
# Padrao: 127.0.0.1
LoginHost = 127.0.0.1

# Porta TCP que o login server escuta para conexoes do gameserver.
# Padrao: 9014
LoginPort = 9014

# Endereco de bind do gameserver. Na maioria dos casos nao precisa alterar.
# AVISO: Nao altere os IPs padrao se voce nao souber o que esta fazendo!
# AVISO: IPs externo/interno agora ficam em "ipconfig.xml".
# Padrao: * (0.0.0.0)
GameserverHostname = 0.0.0.0

# Padrao: 7777
GameserverPort = 7777

# Criptografia de pacotes.
# Por padrao, pacotes enviados e recebidos sao criptografados com algoritmo Blowfish.
# Desativar reduz os recursos necessarios para processar pacotes.
# Pacotes transmitidos nao precisam ser re-criptografados para cada cliente.
# Retail: True
PacketEncryption = False


# ---------------------------------------------------------------------------
# Configuracoes Gerais do Servidor
# ---------------------------------------------------------------------------
# ID do servidor que o Game Server vai solicitar.
# Exemplo: 1 = Bartz
# Padrao: 1
RequestServerID = 1

# True = O Login Server atribui outro ID se o solicitado ja estiver reservado.
# Padrao: True
AcceptAlternateID = True

# Diretorio raiz do datapack.
# Padrao e o diretorio de onde o servidor e iniciado.
# AVISO: Se o caminho for invalido, causara multiplos erros!
# Padrao: .
DatapackRoot = .

# Diretorio raiz dos scripts.
ScriptRoot = ./data/scripts

# Numero maximo de jogadores simultaneos permitidos no servidor.
# Padrao: 2000
MaximumOnlineUsers = 2000

# Revisoes de protocolo que o servidor aceita para conexao.
# Separadas por ponto-e-virgula.
# AVISO: Alterar a revisao do protocolo pode causar comunicacao incompativel e erros no jogo!
# Padrao: 267;268;271;273
AllowedProtocolRevisions = 267;268;271;273

# Tipo do servidor exibido ao lado do nome na selecao de personagem.
# Valores aceitos: Normal, Relax, Test, Broad, Restricted, Event, Free, World, New, Classic
# Padrao: Free
ServerListType = Free

# Idade minima exibida no servidor na selecao de personagem.
# Valores aceitos: 0, 15, 18
# Padrao: 0
ServerListAge = 0

# Exibe [] na frente do nome do servidor na selecao de personagem.
# Padrao: False
ServerListBrackets = False


# ---------------------------------------------------------------------------
# Configuracao de Threads
# ---------------------------------------------------------------------------
# Numero de threads no pool de threads agendadas.
# -1 = Determinado automaticamente (processadores disponiveis x 4).
# Um pool de alta prioridade e criado com 1/4 do tamanho do pool agendado.
# Valores maiores melhoram o processamento sob carga pesada mas usam mais CPU e memoria.
ScheduledThreadPoolSize = -1

# Numero de threads no pool de threads instantaneas.
# -1 = Determinado automaticamente (processadores disponiveis x 2).
# Valores maiores melhoram o processamento sob carga pesada mas usam mais CPU e memoria.
InstantThreadPoolSize = -1

# Usa threads para acelerar a inicializacao do servidor.
# Padrao: False
ThreadsForLoading = False


# ---------------------------------------------------------------------------
# Monitor de Deadlock (thread separada para detectar travamentos)
# ---------------------------------------------------------------------------
# Melhora os logs de crash e permite reinicio automatico em caso de deadlock.
# Intervalo de verificacao em segundos.
# Padrao: True
DeadlockWatcher = True

# Padrao: 20
DeadlockCheckInterval = 20

# Padrao: False
RestartOnDeadlock = False


# ---------------------------------------------------------------------------
# Configuracoes de HWID do Jogador
# ---------------------------------------------------------------------------
# Verifica se informacoes de hardware sao enviadas ao logar.
# AVISO: Para receber informacoes de hardware, o cliente precisa de um
# system modificado para definir o HWID do GameClient via metodo setHardwareInfo.
# Padrao: False
EnableHardwareInfo = False

# Jogadores sem informacoes de hardware sao expulsos do jogo.
# Automaticamente definido como True quando MaxPlayersPerHWID > 0.
# Padrao: False
KickMissingHWID = False

# Numero maximo de jogadores por HWID permitidos no jogo.
# Padrao: 0 (ilimitado)
MaxPlayersPerHWID = 0


# ---------------------------------------------------------------------------
# Configuracoes Diversas do Jogador
# ---------------------------------------------------------------------------
# Modelo de nome de personagem (expressao regular).
# Exemplos:
# CnameTemplate = [A-Z][a-z]{3,3}[A-Za-z0-9]*
# Permite nomes com primeira letra maiuscula, tres minusculas, e qualquer letra/numero. Ex: OmfgWTF1
# CnameTemplate = [A-Z][a-z]*
# Permite apenas letras com primeira maiuscula. Ex: Omfgwtf
# Padrao: .* (permite qualquer simbolo)
CnameTemplate = (^[A-Za-z0-9]{1,16}$)

# Modelo de nome de pet. Mesma logica do CnameTemplate.
PetNameTemplate = (^[A-Za-z0-9]{1,16}$)

# Modelo de nome de cla/sub-pledges. Mesma logica do CnameTemplate.
ClanNameTemplate = (^[A-Za-z0-9]{1,16}$)

# Numero maximo de personagens por conta.
# Padrao: 7 (limite do cliente)
CharMaxNumber = 7


# ---------------------------------------------------------------------------
# Reinicio Preventivo do Servidor
# ---------------------------------------------------------------------------
# Ativa o reinicio do servidor quando o uso de CPU ou memoria esta muito alto.
# Padrao: False
PrecautionaryRestartEnabled = False

# Ativa monitoramento do uso de CPU do sistema.
# Padrao: True
PrecautionaryRestartCpu = True

# Ativa monitoramento do uso de memoria do processo.
# Padrao: False
PrecautionaryRestartMemory = False

# Verifica se ha cercos em andamento, jogadores na olympiad,
# eventos, instancias ou com raidbosses como alvo.
# Padrao: True
PrecautionaryRestartChecks = True

# Porcentagem de uso de recursos para disparar o reinicio.
# Padrao: 95
PrecautionaryRestartPercentage = 95

# Intervalo em segundos entre cada verificacao.
# Padrao: 60
PrecautionaryRestartDelay = 60


# ---------------------------------------------------------------------------
# Reinicio Agendado do Servidor
# ---------------------------------------------------------------------------
# Ativa o reinicio agendado do servidor.
# Padrao: False
ServerRestartScheduleEnabled = False

# Mostra uma mensagem quando o jogador entra no jogo informando o proximo reinicio.
# Padrao: False
ServerRestartScheduleMessage = False

# Contagem regressiva do reinicio (em segundos).
# Padrao: 600 (10 minutos)
ServerRestartScheduleCountdown = 600

# Horarios de reinicio agendado.
# Pode colocar mais de um separado por virgula.
# Exemplo: 12:00, 00:00
ServerRestartSchedule = 08:00

# Dias da semana em que o reinicio ocorrera. Separados por virgula.
# Exemplo: 1,2,3,4,5,6,7 (DOMINGO,SEGUNDA,TERCA,QUARTA,QUINTA,SEXTA,SABADO)
# Padrao: 4 (QUARTA)
ServerRestartDays = 4
