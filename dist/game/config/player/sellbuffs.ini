# ---------------------------------------------------------------------------
# Configuracao de Venda de Buffs
# ---------------------------------------------------------------------------
# Comando: .sellbuff ou .sellbuffs
# Permite que jogadores vendam seus buffs para outros jogadores.
SellBuffEnable = False

# Multiplicador do custo de mana dos buffs vendidos.
# Exemplo: 1 = custo normal de MP, 2 = dobro do custo.
MpCostMultipler = 1

# ID do item usado como moeda de pagamento.
# 57 = Adena (moeda padrao). Pode ser alterado para uma moeda custom do servidor.
PaymentID = 57

# Preco minimo que o jogador pode cobrar por cada buff.
MinimumPrice = 100000

# Preco maximo que o jogador pode cobrar por cada buff.
MaximumPrice = 100000000

# Quantidade maxima de buffs que o jogador pode colocar na lista de venda.
MaxBuffs = 20
