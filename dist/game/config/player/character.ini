# Permitir avancar para qualquer classe dentro da arvore de classes
# Se ativado (True), permite pular classes intermediarias.
# Exemplo: Dwarven Fighter podera avancar direto para Warsmith, Bounty Hunter, etc.
# Se desativado, cada classe so pode avancar para a proxima na hierarquia.
# Padrao: False
AllowEntireTree = False

# Troca de classe automatica ao atingir o level necessario
