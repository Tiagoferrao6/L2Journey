# ---------------------------------------------------------------------------
#                   DISTRIBUIcaO DE XP EM GRUPO (PARTY)
# ---------------------------------------------------------------------------
# Metodo de corte de XP no grupo
# Define como a experiencia e distribuida entre membros de diferentes levels.
# Quando a diferenca de level e muito grande, o membro mais fraco pode ter
# sua recompensa de XP/SP reduzida ou cortada.
#
# Metodos disponiveis:
#   highfive  = Usa faixas de diferenca de level (configuraveis abaixo)
#   auto      = Remove o membro da divisao de XP quando sua parte seria menor que o bonus de grupo (30%)
#   level     = Corta XP quando a diferenca de level e maior que o valor configurado
#   percentage = Corta XP quando a porcentagem de participacao e menor que o valor configurado
#   none      = Sem corte - todos recebem XP normalmente
# Padrao: highfive
PartyXpCutoffMethod = none

# Porcentagem minima de participacao (usado quando o metodo e "percentage")
# Nao use valores altos!
# Padrao: 3.0
PartyXpCutoffPercent = 3.0

# Diferenca maxima de level permitida (usado quando o metodo e "level")
# Nao use valores muito baixos!
# Padrao: 20
PartyXpCutoffLevel = 80

# Faixas de diferenca de level (usado quando o metodo e "highfive")
# Cada par de numeros define uma faixa de diferenca de level.
# Exemplo: 0,9 = diferenca de 0 a 9 levels (sem penalidade)
#          10,14 = diferenca de 10 a 14 levels (penalidade parcial)
#          15,99 = diferenca de 15+ levels (XP cortado)
# Padrao: 0,9;10,14;15,99
PartyXpCutoffGaps = 0,9;10,14;15,99

# Porcentagem de XP recebido em cada faixa (usado quando o metodo e "highfive")
# Cada numero corresponde a porcentagem de XP na respectiva faixa acima.
# Exemplo: 100 = 100% XP, 30 = apenas 30% XP, 0 = sem XP
# Padrao: 100;30;0
PartyXpCutoffGapPercent = 100;30;0

# Desativar o tutorial para novos jogadores
# O tutorial guia novos jogadores nos primeiros passos do jogo.
# ATENcaO: Pode ser importante para jogadores iniciantes.
