# ---------------------------------------------------------------------------
#                   CLASSES, SUB-CLASSES E APRENDIZADO
# ---------------------------------------------------------------------------
# Permitir troca de classe via NPC Class Master (Gerenciador de Classes)
# Se ativado (True), o jogador pode trocar de classe usando o NPC Class Master
# sem precisar completar as quests de mudanca de classe.
# Padrao: False
AllowClassMasters = False

# Configuracao de custos e recompensas do NPC Class Master
# Formato: numero_da_troca;[idItem(quantidade)];[idItemRecompensa(quantidade)]
# Exemplo explicado:
#   1;[57(100000)];[] = 1ª troca de classe por 100.000 Adena (item 57), sem recompensa
#   2;[57(1000000)];[] = 2ª troca por 1.000.000 Adena
#   3;[57(10000000)],[5575(1000000)];[6622(1)] = 3ª troca por 10M Adena + 1M Ancient Adena,
#     recompensa: 1 Book of Giants (item 6622)
