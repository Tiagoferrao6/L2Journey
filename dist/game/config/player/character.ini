# ---------------------------------------------------------------------------
#                  ESTATiSTICAS GERAIS DO PERSONAGEM
# ---------------------------------------------------------------------------
# Perder level ao morrer (De-level)
# Se ativado (True), o personagem perde level caso sua experiencia caia abaixo
# do minimo necessario para o level atual ao morrer.
# Se desativado (False), o personagem nunca perde level, mesmo sem experiencia.
# Padrao: True
Delevel = True

# Reduzir o nivel das skills ao perder level
# Se ativado (True), quando o personagem perde level, suas skills serao ajustadas
# para o nivel maximo permitido pelo novo level. Se o level do personagem ficar
# 9 niveis abaixo do necessario para aprender a skill, ela e removida.
# Padrao: True
DecreaseSkillOnDelevel = True

# Multiplicador do limite de peso
# Define quantas vezes o limite de peso padrao sera multiplicado.
# Exemplo: 5 = jogadores carregam 5x mais peso que o normal.
# Padrao: 1
AltWeightLimit = 10

# Bonus de velocidade de corrida
# Adiciona este valor a velocidade base de corrida do personagem.
# Exemplo: 5 = +5 de velocidade ao correr.
# Padrao: 0
RunSpeedBoost = 0

# Chance (%) de receber o debuff "Penalidade de Morte" ao morrer para um monstro
# Quanto maior o valor, maior a chance de receber a penalidade.
# Padrao: 20
DeathPenaltyChance = 10

# Porcentagem de HP, MP e CP restaurados ao reviver (respawn)
# Define quanto de cada recurso o personagem recupera ao reviver apos morrer.
# Coloque 0 para nao restaurar nada.
# Padrao: 0, 65, 0
RespawnRestoreCP = 20
RespawnRestoreHP = 65
RespawnRestoreMP = 10

# Multiplicador da velocidade de regeneracao de HP, MP e CP
# Controla a velocidade com que HP, MP e CP se regeneram naturalmente.
# O valor e uma porcentagem: 100 = velocidade normal (100%).
# Valores menores = regeneracao mais lenta. Exemplo: 10 = apenas 10% da velocidade normal.
# Valores maiores = regeneracao mais rapida. Exemplo: 200 = dobro da velocidade.
# Padrao: 100, 100, 100
HpRegenMultiplier = 100
MpRegenMultiplier = 100
CpRegenMultiplier = 100


