#-------------------------------------------------------------
# Titulos e Cores por Quantidade de PvP
#-------------------------------------------------------------
# Sistema que muda automaticamente o titulo e a cor do nome do jogador
# conforme a quantidade de PvPs acumulados.
# Exemplo: PvpAmount1 = 500 significa que ao atingir 500 PvPs o jogador recebe o rank.
# ATENcaO: As cores devem ser em formato RGB hexadecimal, uma cor para cada rank.
# ATENcaO: Nao use junto com o sistema de Faccoes.
EnablePvPColorSystem = False

# Rank 1
PvpAmount1 = 500
ColorForAmount1 = 9C9C9C
PvPTitleForAmount1 = Sergeant

# Rank 2
PvpAmount2 = 1000
ColorForAmount2 = 696969
PvPTitleForAmount2 = Lieutenant

# Rank 3
PvpAmount3 = 1500
ColorForAmount3 = 4F4F4F
PvPTitleForAmount3 = Captain

# Rank 4
PvpAmount4 = 2500
ColorForAmount4 = 363636
PvPTitleForAmount4 = Major

# Rank 5
PvpAmount5 = 5000
ColorForAmount5 = 1C1C1C
PvPTitleForAmount5 = General
