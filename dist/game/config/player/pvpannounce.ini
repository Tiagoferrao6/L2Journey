# ---------------------------------------------------------------------------
# Anuncio de PvP/PK
# ---------------------------------------------------------------------------
# Ativa anuncios automaticos quando um jogador mata outro (PvP ou PK).
# Padrao: False
AnnouncePkPvP = False

# Exibir o anuncio como mensagem normal do sistema (em vez de mensagem especial).
# Padrao: True
AnnouncePkPvPNormalMessage = True

# Modelo da mensagem de PK (quando mata jogador inocente).
# Variaveis disponiveis: $killer (quem matou), $target (quem morreu)
AnnouncePkMsg = $killer has slaughtered $target

# Modelo da mensagem de PvP (quando mata jogador flagado).
# Variaveis disponiveis: $killer (quem matou), $target (quem morreu)
AnnouncePvpMsg = $killer has defeated $target
