# ---------------------------------------------------------------------------
# Pocoes Automaticas
# ---------------------------------------------------------------------------
# O jogador usa os comandos .apon / .apoff ou .potionon / .potionoff para ativar/desativar.
# Ativa o sistema de pocoes automaticas.
AutoPotionsEnabled = False

# Permitir uso de pocoes automaticas nas Olimpiadas.
AutoPotionsInOlympiad = False

# Nivel minimo do jogador para poder usar os comandos.
AutoPotionMinimumLevel = 1

# Ativa pocoes automaticas de CP (Combat Points).
AutoCpEnabled = True
# Porcentagem de CP em que a pocao sera usada automaticamente (ex: 70 = usa quando CP cair abaixo de 70%).
AutoCpPercentage = 70
# IDs dos itens de pocao de CP. Ordem define a prioridade de uso.
AutoCpItemIds = 5592,5591

# Ativa pocoes automaticas de HP (vida).
AutoHpEnabled = True
# Porcentagem de HP em que a pocao sera usada automaticamente.
AutoHpPercentage = 70
# IDs dos itens de pocao de HP. Ordem define a prioridade de uso.
AutoHpItemIds = 1540,1539,1061,1060

# Ativa pocoes automaticas de MP (mana).
AutoMpEnabled = True
# Porcentagem de MP em que a pocao sera usada automaticamente.
AutoMpPercentage = 70
# IDs dos itens de pocao de MP. Ordem define a prioridade de uso.
AutoMpItemIds = 728
