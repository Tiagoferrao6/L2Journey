# ---------------------------------------------------------------------------
# Jogar Offline (Auto Play Offline)
# ---------------------------------------------------------------------------
# Ativa o comando .offlineplay para deslogar e continuar farmando automaticamente.
# O personagem fica no jogo farmando mesmo apos o jogador fechar o client.
# Padrao: False
EnableOfflinePlayCommand = False

# Permitir o comando .offlineplay apenas para jogadores premium/VIP.
# O Sistema Premium precisa estar ativado.
# Padrao: False
OfflinePlayPremium = False

# Deslogar o jogador offline quando ele morrer.
# Padrao: True
OfflinePlayLogoutOnDeath = True

# Desconectar o jogador offline se outra conta do mesmo computador logar no jogo.
OfflinePlayDisconnectSameAccount = False

# Mensagem enviada aos jogadores ao fazer login.
# Deixe vazio para desativar.
# Exemplo: Voce pode usar .offlineplay para deslogar e continuar farmando automaticamente.
OfflinePlayLoginMessage = 

# Se True, a cor do nome do personagem sera alterada ao entrar no modo offline play.
# Padrao: True
OfflinePlaySetNameColor = True

# Cor do nome no modo offline play (se OfflinePlaySetNameColor = True).
# Formato hexadecimal RGB.
# Padrao: 808080 (cinza)
OfflinePlayNameColor = 808080

# Efeito visual (animacao) exibido no personagem em modo offline play.
# Pode usar multiplos efeitos separados por virgula para escolha aleatoria.
# Deixe vazio para desativar.
# Exemplo: SLEEP
OfflinePlayAbnormalEffect = 
