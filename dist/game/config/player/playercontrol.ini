# ------------------------------------------------------------------------------------------
# Controles Customizados de Jogador
# ------------------------------------------------------------------------------------------
# Retorna a arma as maos do jogador automaticamente apos o efeito de Disarm (desarmar) acabar.
# Se False, o jogador precisa re-equipar a arma manualmente.
# OffLike: False
DisarmReturnsWeapon = False

# Bloqueia o uso de skills de augmentacao durante as Olimpiadas.
# OffLike: False
BlockAugmentSkillsInOly = False

# Bloqueia o teleporte para jogadores em modo de combate (flagados PvP).
# OffLike: False
BlockTeleportInCombatMode = False

# Bloqueia o chat para jogadores que estao mortos.
# OffLike: False
BlockChatForDeadPlayers = False

# Exibe o efeito visual da skill "Return" (teleporte) ao usar Gatekeepers (NPCs de teleporte).
# OffLike: False
TeleportEffect = False

# Bloqueia o uso de Mana Potion durante sieges (cercos de castelo).
# Padrao: False
BlockManaInSiegeZone = False
