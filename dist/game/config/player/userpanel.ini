# ------------------------------------------------------------------------------------------
# Painel do Usuario e Funcoes
# ------------------------------------------------------------------------------------------
# Ativa o painel de usuario (interface com comandos e funcoes extras).
EnableUserPanel = True

# Ativa o comando .epic
# Mostra se os GrandBosses (Antharas, Valakas, etc.) estao vivos ou mortos.
EpicCommand = True

# Ativa o comando .combinetalismans
# Combina talismans do mesmo tipo em apenas 1, somando o tempo restante de todos.
CombineTalismansCommand = True

# Ativa o sistema DressMe (trocar aparencia visual de equipamentos).
# Os sets e armaduras sao configurados em "...game\data\dressme".
DressMeSystem = False

# Ativa o comando .changepassword para que o jogador troque a senha da conta dentro do jogo.
# Padrao: False
AllowChangePassword = True


# ---------------------------------------------------------------------------
# Suporte Multi-Idioma
# ---------------------------------------------------------------------------
# Ativa o suporte a multiplos idiomas no servidor.
# Quando ativado, HTMLs de NPCs podem ser traduzidos e o jogador escolhe o idioma.
# Padrao: False
MultiLangEnable = True

# Idioma padrao caso o jogador nao tenha definido um.
# Padrao: en
MultiLangDefault = en

# Lista de idiomas permitidos, separados por ponto-e-virgula.
# Padrao: en;el
MultiLangAllowed = en;br

# Se um arquivo HTML traduzido nao for encontrado (ex: em data/lang/br/),
# o servidor tentara carregar a versao do idioma padrao (ex: data/lang/en/).
# Padrao: True
RestoreHtmlByDefault = True

# Ativa o comando de voz .lang para que jogadores troquem de idioma durante o jogo.
# Padrao: True
MultiLangVoiceCommand = True


# ---------------------------------------------------------------------------
# Configuracoes de Auto Play (Farming Automatico)
# ---------------------------------------------------------------------------
# Ativa o comando .play para farming automatico.
# O personagem ataca monstros e usa skills automaticamente.
# Padrao: False
EnableAutoPlay = False

# Permitir uso automatico de pocoes durante o auto play.
# Padrao: True
EnableAutoPotion = True

# Permitir uso automatico de skills durante o auto play.
# Padrao: True
EnableAutoSkill = True

# Permitir uso automatico de itens durante o auto play.
# Padrao: True
EnableAutoItem = True

# Retomar o auto play automaticamente ao reconectar no jogo.
# Retail: False
ResumeAutoPlay = False

# Assistir o lider do grupo.
# Quando em grupo, o personagem ataca o mesmo alvo que o lider esta atacando.
# Retail: False
AssistLeader = False

# Alcance de selecao de alvo.
# ShortRange = distancia curta (para classes corpo a corpo)
# LongRange = distancia longa (para classes de longo alcance)
# Padrao ShortRange: 500
# Padrao LongRange: 1000
ShortRange = 500
LongRange = 1000

# Permitir o comando .play apenas para jogadores premium/VIP.
# O Sistema Premium precisa estar ativado.
# Padrao: False
AutoPlayPremium = False

# Lista de IDs de skills que NaO podem ser adicionadas ao menu de auto play, separados por virgula.
DisabledSkillIds = 42

# Lista de IDs de itens que NaO podem ser adicionados ao menu de auto play, separados por virgula.
DisabledItemIds = 

# Mensagem enviada ao jogador no login sobre o auto play.
# Deixe vazio para desativar.
# Exemplo: Voce pode usar .play para automatizar o farming.
AutoPlayLoginMessage = 


# ---------------------------------------------------------------------------
# Estatisticas do Servidor
# ---------------------------------------------------------------------------
# Exibe a quantidade de jogadores online em cada categoria:
# - Players online (total)
# - Jogadores ativos
# - Lojas offline
ServerStatistics = False
