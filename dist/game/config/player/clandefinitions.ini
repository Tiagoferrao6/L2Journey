# ---------------------------------------------------------------------------
# Cla (Clan)
# ---------------------------------------------------------------------------
# Dia da semana em que todas as solicitacoes pendentes de troca de lider de cla serao aplicadas.
# Valores possiveis:
# 1 - Domingo
# 2 - Segunda-feira
# 3 - Terca-feira
# 4 - Quarta-feira
# 5 - Quinta-feira
# 6 - Sexta-feira
# 7 - Sabado
# Padrao: 3 (terca-feira)
AltClanLeaderDateChange = 3

# Horario em que as solicitacoes pendentes serao processadas.
# Formato: Hora:Minuto:Segundo
# Padrao: 00:00:00
AltClanLeaderHourChange = 00:00:00

# Se ativado, todas as solicitacoes de troca de lider de cla serao aplicadas instantaneamente.
# Padrao: False
AltClanLeaderInstantActivation = False

# Numero de dias de espera antes de poder entrar em outro cla apos sair de um.
# Padrao: 1
DaysBeforeJoinAClan = 1

# Numero de dias de espera antes de poder criar um novo cla.
# Padrao: 10
DaysBeforeCreateAClan = 1

# Numero de dias que leva para dissolver (excluir) um cla.
# Padrao: 7
DaysToPassToDissolveAClan = 1

# Dias de espera para entrar em uma nova alianca quando o cla saiu voluntariamente de uma.
# Padrao: 1
DaysBeforeJoinAllyWhenLeaved = 1

# Dias de espera para entrar em uma nova alianca quando o cla foi expulso de uma.
# Padrao: 1
DaysBeforeJoinAllyWhenDismissed = 1

# Dias de espera para aceitar um novo cla na alianca quando um cla foi expulso.
# Padrao: 1
DaysBeforeAcceptNewClanWhenDismissed = 1

# Dias de espera para criar uma nova alianca apos dissolver a anterior.
# Padrao: 1
DaysBeforeCreateNewAllyWhenDissolved = 1

# Numero maximo de clas em uma alianca.
# Padrao: 3
AltMaxNumOfClansInAlly = 3

# Permitir que membros do cla retirem itens do armazem do cla.
# Padrao: False
AltMembersCanWithdrawFromClanWH = False

# Remover as circlets (coroas) de castelo quando o cla perde o castelo ou um jogador sai do cla.
# Padrao: True
RemoveCastleCirclets = True

# Numero minimo de membros necessarios para declarar guerra de cla.
# Padrao: 15
AltClanMembersForWar = 1


# ------------------------------------------------------------------------------------------
# Configuracoes Customizadas de Cla
# ------------------------------------------------------------------------------------------
# Anuncio automatico quando o dono do castelo entra no jogo.
# A mensagem seguira o formato: "Ruler of " + nomeDoCastelo + " castle is Online!"
AnnounceCastleLord = False

# Sistema de Recompensa da Academia do Cla.
# Se ativado, o cla recebe um item quando um membro da academia se forma (atinge nivel 40).
# OffLike: False
EnableAcademyReward = False

# ID e quantidade do item de recompensa da academia.
AcademyRewardID = 57
AcademyRewardCount = 10000
