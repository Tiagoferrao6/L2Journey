# Configuracoes de Drop ao Morrer com Karma (PK)
# ---------------------------------------------------------------------------
# Permitir que GMs percam equipamento ao morrer com karma.
# Padrao: False
CanGMDropEquipment = False

# ATENcaO: Nao coloque espacos entre os numeros nas listas!
