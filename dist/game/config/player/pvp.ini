# ---------------------------------------------------------------------------
# Sistema Anti-Feed (Anti-Abuso de PvP/PK)
# ---------------------------------------------------------------------------
# Ativa a protecao anti-feed para pontos de PvP/PK e reputacao de cla.
# Evita que jogadores abusem matando personagens proprios para ganhar pontos.
# Padrao: False
AntiFeedEnable = False

# Se True, kills de dualbox (mesmo IP) nao aumentarao pontos de PvP/PK
# e a reputacao de cla nao sera transferida.
# Padrao: True
AntiFeedDualbox = True

# Se True, jogadores desconectados (sem IP identificavel) tambem serao considerados dualbox.
# Padrao: True
AntiFeedDisconnectedAsDualbox = True

# Se o personagem morrer mais rapido que este tempo (em segundos), o matador nao recebe pontos de PvP/PK.
# 0 = desativado.
# Padrao: 120 segundos
AntiFeedInterval = 120


# ---------------------------------------------------------------------------
# Diversos
# ---------------------------------------------------------------------------
# Conceder ponto de PvP ao matar um jogador com karma (PK)?
# Padrao: False
AwardPKKillPVPPoint = False

# Tempo (em ms) que o jogador permanece em modo PvP apos atacar um jogador inocente (sem flag).
# Padrao: 120000 (2 minutos)
PvPVsNormalTime = 120000

# Tempo (em ms) que o jogador permanece em modo PvP apos atacar um jogador ja flagado (roxo).
# Padrao: 60000 (1 minuto)
PvPVsPvPTime = 60000


# ---------------------------------------------------------------------------
# Cancel Customizado
# ---------------------------------------------------------------------------
# Restaura os buffs automaticamente apos um tempo quando removidos por skills de Cancel.
# Padrao: False
ReturnCancel = False

# Tempo (em segundos) que o jogador deve esperar para os buffs voltarem.
ReturnCancelTime = 10

