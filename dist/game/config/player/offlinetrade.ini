# ---------------------------------------------------------------------------
# Comercio/Craft Offline
# ---------------------------------------------------------------------------
# Ativa o sistema de loja offline (venda/compra enquanto deslogado).
OfflineTradeEnable = True

# Ativa o sistema de craft offline (producao enquanto deslogado).
OfflineCraftEnable = True

# Se True, lojas offline so poderao ser abertas em zonas de paz.
OfflineModeInPeaceZone = True

# Se True, jogadores em modo loja offline nao receberao dano (nao podem ser mortos).
OfflineModeNoDamage = True

# Se True, a cor do nome sera alterada ao entrar no modo offline.
OfflineSetNameColor = True

# Cor do nome no modo offline (se OfflineSetNameColor = True).
# Formato hexadecimal RGB.
OfflineNameColor = 808080

# Permitir ganho de Fama para personagens em modo offline.
OfflineFame = True

# Restaurar jogadores offline apos restart/desligamento do servidor.
RestoreOffliners = False

# Nao restaurar personagens offline apos X dias desde a primeira restauracao.
# Requer restart do servidor para desconectar lojas expiradas.
# 0 = desativado (sempre restaurar).
OfflineMaxDays = 0

# Desconectar a loja automaticamente apos ela terminar de vender/comprar todos os itens.
OfflineDisconnectFinished = True

# Desconectar a loja offline se outra conta do mesmo computador logar no jogo.
OfflineDisconnectSameAccount = False

# Salvar transacoes de lojas offline em tempo real no banco de dados.
# Usa mais recursos do banco, mas protege os dados se o servidor cair inesperadamente.
StoreOfflineTradeInRealtime = True

# Ativa o comando .offline para deslogar e manter a loja aberta.
EnableOfflineCommand = True

# Efeito visual (animacao) exibido no personagem em modo loja offline.
# Pode usar multiplos efeitos separados por virgula para escolha aleatoria.
# Deixe vazio para desativar.
# Exemplo: SLEEP
OfflineAbnormalEffect = 
