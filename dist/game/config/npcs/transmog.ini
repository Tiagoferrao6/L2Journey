# ---------------------------------------------------------------------------
# Sistema de Transmogrificacao
# ---------------------------------------------------------------------------
# A Transmogrificacao permite substituir a aparencia das suas
# armaduras e armas pela aparencia de outros itens.
# Qualquer item adquirido e adicionado a sua colecao de transmog.
# Voce pode acessar este sistema pelo NPC Zumzi (900009).
# Ativa/Desativa o Sistema de Transmogrificacao.
TransmogEnabled = False

# Compartilha transmog entre personagens da mesma conta.
TransmogShareAccount = False

# Custo em Adena para aplicar transmog.
TransmogApplyCost = 0

# Custo em Adena para remover transmog.
TransmogRemoveCost = 0

# Lista de itens que nao podem ser adicionados ao transmog, separados por virgula.
TransmogBannedItemIds = 
