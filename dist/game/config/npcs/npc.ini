# ---------------------------------------------------------------------------
# Configuracoes de NPCs
# ---------------------------------------------------------------------------
# Anuncios globais indicando pontos de spawn do Ferreiro/Mercador de Mammon.
# Padrao: False
AnnounceMammonSpawn = True

# True - Mobs podem ser agressivos em zonas de paz.
# False - Mobs NAO podem ser agressivos em zonas de paz.
# Padrao: True
AltMobAgroInPeaceZone = True

# Define se NPCs sao atacaveis por padrao.
# Retail: True
AltAttackableNpcs = False

# Permite jogadores nao-GM verem status de NPCs com shift+click.
# Padrao: False
AltGameViewNpc = True

# Mostrar nivel do NPC.
# Padrao: False
ShowNpcLevel = False

# Mostrar agressividade do NPC.
# Padrao: False
ShowNpcAggression = False

# Mobs atacaveis nao ficam em cima de corpos de jogadores.
AttackablesCampPlayerCorpses = False

# Mostrar brasoes de cla/alianca em NPCs de territorio sem quest.
# Padrao: False
ShowCrestWithoutQuest = True

# Efeito aleatorio de encantamento visual nos NPCs.
# Todos os NPCs com armas recebem um valor aleatorio de encantamento visual.
# O encantamento e apenas visual, faixa de 4 a 21.
# Padrao: False
EnableRandomEnchantEffect = False

# Nivel minimo de NPC para a regra de Gracia Epilogue:
# "O dano causado em monstros sera menor se o personagem estiver 2 ou mais niveis abaixo
# de um monstro nivel 78+."
# Observacoes:
#	Defina como 99 para desativar esta funcionalidade.
# Padrao: 78
MinNPCLevelForDmgPenalty = 78

# Penalidade em porcentagem para diferencas de -2 a -5 niveis.
# Padrao:
# normal - 0.7, 0.6, 0.6, 0.55
# critico - 0.75, 0.65, 0.6, 0.58
# habilidade - 0.8, 0.7, 0.65, 0.62
DmgPenaltyForLvLDifferences = 0.7, 0.6, 0.6, 0.55
CritDmgPenaltyForLvLDifferences = 0.75, 0.65, 0.6, 0.58
SkillDmgPenaltyForLvLDifferences = 0.8, 0.7, 0.65, 0.62

# Nivel minimo de NPC para a regra de Gracia Epilogue:
# "Quando o nivel do personagem e 3 ou mais niveis abaixo do monstro,
# a chance do monstro resistir a magia aumenta."
# Observacoes:
#	Defina como 99 para desativar esta funcionalidade.
# Padrao: 78
MinNPCLevelForMagicPenalty = 78

# Penalidade em porcentagem para diferencas de -3 a -6 niveis.
# Padrao: desconhecido
SkillChancePenaltyForLvLDifferences = 2.5, 3.0, 3.25, 3.5


# ---------------------------------------------------------------------------
# Monstros
# ---------------------------------------------------------------------------
# Intervalo da tarefa de decomposicao de corpos (em milissegundos). Nao defina muito baixo!
# Padrao: 5000
DecayTimeTask = 5000

# Tempo padrao de permanencia do corpo morto (em segundos).
# Padrao: 7
DefaultCorpseTime = 7

# Tempo adicional para corpos espoliados (spoil) permanecerem (em segundos).
# Padrao: 10
SpoiledCorpseExtendTime = 10

# Tempo permitido para usar habilidade de consumir corpo antes de decompor.
# Padrao: 2000
CorpseConsumeSkillAllowedTimeBeforeDecay = 2000

# Distancia maxima de aggro dos mobs.
# Padrao: 500
MaxAggroRange = 450

# Distancia maxima que monstros podem se mover aleatoriamente do ponto de spawn.
# Padrao: 300
MaxDriftRange = 300
 
# Ativa verificacao de distancia de aggro dos monstros.
# Quando ativado, monstros perdem aggro se puxados para longe do spawn.
# Padrao: False
AggroDistanceCheckEnabled = False

# Distancia maxima que monstros podem ser puxados do spawn.
# Sobescrito pelo parametro chaseRange do Spawn.
# Padrao: 2000
AggroDistanceCheckRange = 2000

# Usar verificacao de distancia maxima de aggro para raids.
# Grand Bosses sao excluidos.
# Padrao: False
AggroDistanceCheckRaids = False

# Distancia maxima que raids podem ser puxados do spawn.
# Sobescrito pelo parametro chaseRange do Spawn.
# Padrao: 4000
AggroDistanceCheckRaidRange = 4000

# Usar verificacao de distancia de aggro em instancias.
# Padrao: False
AggroDistanceCheckInstances = False

# Restaura HP e MP do monstro quando o aggro e resetado por distancia.
# Padrao: True
AggroDistanceCheckRestoreLife = True


# ---------------------------------------------------------------------------
# Guardas
# ---------------------------------------------------------------------------
# True - Permite guardas atacarem mobs agressivos dentro do alcance.
# Padrao: False
GuardAttackAggroMob = False


# ---------------------------------------------------------------------------
# Pets (Mascotes)
# ---------------------------------------------------------------------------
# Ativa o gerenciador de Wyvern localizado em cada castelo
# para treinar Wyverns e Striders a partir de Hatchlings.
# Padrao: False
AllowWyvernUpgrader = False

# NPCs que alugam pets.
# Exemplo: 30827, 32471, 34486, 36547
# Padrao: 30827
ListPetRentNpc = 30827

# Limite de espacos no inventario para pets (NAO e limite de peso).
# Padrao: 12
MaximumSlotsForPet = 12

# Multiplicador de Regeneracao de HP/MP para Pets.
# Padrao: 100, 100
PetHpRegenMultiplier = 100
PetMpRegenMultiplier = 100


# ---------------------------------------------------------------------------
# Raid Bosses
# ---------------------------------------------------------------------------
# Percentual de regeneracao de HP e MP para raid bosses.
# Exemplo: Definir HP como 10 faz o raid boss regenerar HP 90% mais devagar.
# Padrao: 100, 100
RaidHpRegenMultiplier = 120
RaidMpRegenMultiplier = 120

# Percentual de defesa fisica e magica para raid bosses.
# Exemplo: 10 faz a defesa ser 90% menor que o normal,
# enquanto 110 faz a defesa ser 10% maior.
# Padrao: 100, 100
RaidPDefenceMultiplier = 120
RaidMDefenceMultiplier = 120

# Percentual de ataque fisico e magico para raid bosses.
# Exemplo: 10 faz o ataque ser 90% menor que o normal,
# enquanto 110 faz o ataque ser 10% maior.
# Padrao: 100, 100
RaidPAttackMultiplier = 110
RaidMAttackMultiplier = 110

# Multiplicadores de tempo minimo e maximo entre respawns de raid boss.
# Por padrao 12Horas*1.0 para Tempo Minimo e 24Horas*1.0 para Maximo.
# Exemplo: Definir RaidMaxRespawnMultiplier como 2 faz o intervalo
# de respawn variar de 24 a 48 horas.
# Padrao: 1.0, 1.0
RaidMinRespawnMultiplier = 1.0
RaidMaxRespawnMultiplier = 1.0

# Intervalo de respawn dos minions de raid boss (em milissegundos).
# 1 minuto = 60000 milissegundos.
# Padrao: 300000
RaidMinionRespawnTime = 300000

# Tempo de respawn customizado para minions especificos.
# Formato: idMinion1,tempoEmSegundos1;idMinion2,tempoEmSegundos2
CustomMinionsRespawnTime = 22450,30;22371,120;22543,0;25545,0;22424,30;22425,30;22426,30;22427,30;22428,30;22429,30;22430,30;22432,30;22433,30;22434,30;22435,30;22436,30;22437,30;22438,30;25596,30;25605,0;25606,0;25607,0;25608,0

# Forca deletar minions spawnados quando o mestre morre.
# Por padrao minions sao deletados apenas para raidbosses.
# Padrao: False
ForceDeleteMinions = False

# Desativar Maldicao de Raid se o raid for mais de 8 niveis abaixo.
# Padrao: False
DisableRaidCurse = False

# Intervalo (em segundos) que raid bosses e minions nao reconsideram seus alvos.
# 1 minuto = 60 segundos.
# Padrao: 10,10,10
RaidChaosTime = 30
GrandChaosTime = 30
MinionChaosTime = 30
