# ---------------------------------------------------------------------------
# NPC Buffer / Scripts
# ---------------------------------------------------------------------------
# Ativa Recarregar Script (GM veja HTML e confirme se deseja recarregar).
# Nao esta pronto para uso em servidor ao vivo!
# Padrao: False
EnableReloadScript = True
# Ativa janela inteligente.
EnableSmartWindow = True

# Tempo de espera entre cada acao.
# Recomendado: True
EnableTimeOut = True
TimeoutTime = 1

# Duracao dos buffs (em minutos).
# Padrao: 60
BuffTime = 120

# Padrao: True
EnableFreeBuffs = False

# Ativa buffs para jogadores PK.
EnableBuffForPK = False

# Buffar jogadores com Flag.
EnableBuffForFlagPlayers = False

# Ativa secao de Buffs (Buffs, chants, other, special, ...).
EnableBuffSection = True

# Ativa funcao de Esquema (jogadores podem salvar conjuntos de buffs).
EnableScheme = True
SchemePrice = 100000

# Nivel minimo do personagem para usar o Buffer.
# Padrao: 40
MinimumLevel = 4

# Maximo de esquemas por jogador.
# Padrao: 2
MaxScheme = 2

# Item consumido para buffs (57 = Adena).
# Padrao: 57
ConsumableID = 57


# ---------------------------------------------------------------------------
# Configuracao de Buffs
# ---------------------------------------------------------------------------
EnableHeal = True
HealPrice = 1000

# Ex: Might, Shield, Empower, Focus, ...
EnableBuffs = True
BuffsPrice = 1000

# Ex: Mental Shield, Resist Shock, Resist Fire, Resist Wind, ...
EnableResist = True
ResistPrice = 1000

# Ex: Song of Life, Song of Earth, Song of Wind, Song of Renewal, ...
EnableSongs = True
SongPrice = 1000

# Ex: Dance of the Warrior, Dance of Fire, Dance of Fury, Dance of Light, ...
EnableDances = True
DancePrice = 1000

# Ex: Chant of Renewal, Chant of Rage, Chant of Predator, Chant of Fire, ...
EnableChants = True
ChantsPrice = 1000

# Ex: Spike, Dark Weapon, Blood Pack, Pride of Kamael, ...
EnableOther = False
OtherPrice = 1000

# Ex: Greater Might, Improved Magic, Noblesse Blessing, Chant of Victory, ...
EnableSpecial = True
SpecialPrice = 1000

# Ex: Summon Life Cubic, Summon Viper Cubic, Summon Speak Cubic, ...
# PRECISA FICAR DESATIVADO POIS NAO HA FILTRO PARA ADICIONAR CUBO NO SUMMON/PET
EnableCubic = False
CubicPrice = 1000

# Jogador pode remover todos os buffs (inclusive debuffs!).
EnableRemoveBuffs = True
RemoveBuffsPrice = 1000

# Conjunto predefinido de buffs para Mago e Guerreiro.
EnableBuffSet = True
SetPrice = 10000
