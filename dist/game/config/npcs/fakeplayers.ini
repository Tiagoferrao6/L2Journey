# ---------------------------------------------------------------------------
# Jogadores Falsos (Fake Players)
# ---------------------------------------------------------------------------
# O sistema de jogadores falsos usa o sistema de NPCs existente, permitindo
# que funcionem como NPCs com impacto minimo no desempenho do servidor.
# Ativa jogadores falsos.
EnableFakePlayers = False

# Ativa chat com jogadores falsos.
FakePlayerChat = True

# Ativa uso de shots pelos jogadores falsos.
FakePlayerUseShots = True

# Recompensar com PvP ao matar jogadores falsos.
FakePlayerKillsRewardPvP = True

# Matar jogadores falsos sem flag aplica regras de karma.
FakePlayerUnflaggedKillsKarma = True

# Jogadores falsos podem ser atacados sem gerar flag PvP.
FakePlayerAutoAttackable = False

# IA agressiva: jogadores falsos atacam monstros proximos.
FakePlayerAggroMonsters = True

# IA agressiva: jogadores falsos atacam jogadores proximos.
FakePlayerAggroPlayers = False

# IA agressiva: jogadores falsos atacam outros jogadores falsos.
FakePlayerAggroFPC = False

# Jogadores falsos podem dropar itens ao matar monstros.
FakePlayerCanDropItems = True

# Jogadores falsos podem pegar itens do chao.
FakePlayerCanPickup = True
