# ---------------------------------------------------------------------------
# Banco de Dados
# ---------------------------------------------------------------------------
# Classe do driver JDBC do banco de dados.
# Padrao: com.mysql.cj.jdbc.Driver
Driver = com.mysql.cj.jdbc.Driver

# URL de conexao com o banco de dados.
# Padrao: jdbc:mysql://localhost/l2journey?useUnicode=true&characterEncoding=utf-8&useSSL=false&connectTimeout=10000&interactiveClient=true&sessionVariables=wait_timeout=600,interactive_timeout=600&autoReconnect=true
URL = jdbc:mysql://localhost/l2journey?useUnicode=true&characterEncoding=utf-8&allowPublicKeyRetrieval=true&useSSL=false&connectTimeout=10000&interactiveClient=true&sessionVariables=wait_timeout=600,interactive_timeout=600&autoReconnect=true

# Usuario do banco de dados. Padrao e "root", mas nao e recomendado.
Login = root

# Senha do usuario do banco de dados. Deixe vazio para sem senha.
Password = king

# Numero maximo de conexoes simultaneas com o banco de dados.
# Padrao: 100
MaximumDatabaseConnections = 100

# Testa se as conexoes com o banco de dados estao disponiveis.
# Padrao: False
TestDatabaseConnections = False


# ---------------------------------------------------------------------------
# Backup Automatico do Banco de Dados
# ---------------------------------------------------------------------------
# Gera backups do banco de dados quando o servidor reinicia ou desliga.
BackupDatabase = False

# Caminho da pasta bin do MySQL. Necessario apenas no Windows.
MySqlBinLocation = C:/xampp/mysql/bin/

# Caminho onde os backups do MySQL serao salvos.
BackupPath = ../backup/

# Numero maximo de dias que os backups serao mantidos.
# Arquivos antigos na pasta de backup serao deletados.
# Defina como 0 para desativar.
BackupDays = 30
