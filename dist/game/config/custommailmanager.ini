# ---------------------------------------------------------------------------
# Gerenciador de Emails Customizado
# ---------------------------------------------------------------------------
# Ativa um sistema que envia e-mails in-game (caixa postal do jogo, o sistema de "Mail") 
# para jogadores de forma programatica via banco de dados, sem precisar de interação 
# direta no código do servidor.
# Emails atraves da tabela SQL custom_mail. você insere linhas nela externamente 
# (painel web, ferramenta de GM, script) com os campos: receiver, subject, message, items, date
# Padrao: False
CustomMailManagerEnabled = False

# Intervalo (em segundos) entre consultas ao banco de dados. Para cada linha encontrada, 
# verifica se o jogador está online naquele momento.
# se o jogador estiver online, cria um Message com os itens em anexo e envia via MailManager.
# Em seguida, deleta a linha da tabela.
# Se o jogador estiver offline — a linha permanece na tabela e será tentada novamente 
# no próximo ciclo, até o jogador conectar.
# Padrao: 30
DatabaseQueryDelay = 30
