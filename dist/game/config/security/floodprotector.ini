# ---------------------------------------------------------------------------
# Opcoes do Protetor contra Flood (spam de acoes)
# ---------------------------------------------------------------------------
# As seguintes configuracoes podem ser aplicadas a cada funcionalidade:
# Interval - intervalo em ticks do servidor (1 tick = 100ms) em que apenas uma requisicao e permitida
# LogFlooding - registrar tentativas de flood no log (apenas a primeira ocorrencia e o total sao registrados)
# PunishmentLimit - se o numero de requisicoes no intervalo exceder este numero, a punicao e aplicada (0 = desativa punicao)
# PunishmentType - tipo de punicao ('none', 'kick', 'ban', 'jail'), valido apenas se PunishmentLimit maior que 0
# PunishmentTime - tempo de punicao em minutos para jail/ban (0 = permanente)

# UseItem - flood de uso de itens
# Intervalo de uso de itens.
# Desativado para corresponder ao retail. Para ativar, mude o valor para 4, por exemplo.
# Padrao: 0
FloodProtectorUseItemInterval = 0
FloodProtectorUseItemLogFlooding = False
FloodProtectorUseItemPunishmentLimit = 0
FloodProtectorUseItemPunishmentType = none
FloodProtectorUseItemPunishmentTime = 0

