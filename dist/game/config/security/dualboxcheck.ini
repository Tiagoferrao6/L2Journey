# ---------------------------------------------------------------------------
# Verificacao de Dualbox
# ---------------------------------------------------------------------------
# OBS: Este mod funciona APENAS se a opcao "AntiFeedEnable = True" em PVP.ini
# Numero maximo de jogadores por IP permitidos no jogo.
# Padrao: 0 (ilimitado)
DualboxCheckMaxPlayersPerIP = 0

# Numero maximo de jogadores por IP permitidos na Olympiad.
# Padrao: 0 (ilimitado)
DualboxCheckMaxOlympiadParticipantsPerIP = 0

# Numero maximo de jogadores por IP permitidos em eventos do L2J Event Engine (//event).
# Padrao: 0 (ilimitado)
DualboxCheckMaxL2EventParticipantsPerIP = 0

# Numero maximo de jogadores por IP permitidos no modo offline.
# Padrao: 0 (ilimitado)
DualboxCheckMaxOfflinePlayPerIP = 0

# Numero maximo de jogadores premium por IP permitidos no modo offline.
# Padrao: 0 (ilimitado)
DualboxCheckMaxOfflinePlayPremiumPerIP = 0

# Contar vendedores offline como dualbox.
# Padrao: False
DualboxCountOfflineTraders = False

# Lista branca de enderecos para verificacao de dualbox.
# Formato: Endereco1,Numero1;Endereco2,Numero2...
# O endereco pode ser numerico (127.0.0.1) ou simbolico (localhost).
# Numero adicional de conexoes somado aos limites globais para este endereco.
# Por exemplo, se o numero de participantes de evento TvT por IP for 1 (sem dualbox)
# e a lista branca contiver "l2jmobius.org,2", o numero de participantes permitidos
# sera 1+2=3. Use 0 ou valor negativo para conexoes ilimitadas.
# Padrao: 127.0.0.1,0 (sem limites do localhost)
DualboxCheckWhitelist = 127.0.0.1,0
