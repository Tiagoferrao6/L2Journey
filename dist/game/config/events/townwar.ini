# ---------------------------------------------------------------------------
# Evento Town War (Guerra nas Cidades)
# ---------------------------------------------------------------------------
# OBS: Algumas skills de dano e/ou efeito em area podem ser bloqueadas durante o evento.

# Ativa o sistema automatico do evento Town War.
# Quando ativo, o evento inicia automaticamente nos horarios configurados.
TownWarAutoEvent = False

# Horarios em que o evento ocorrera (formato 24h, separados por virgula).
TownWarInterval = 2:00,15:05,21:00,22:30,00:45

# Tempo de aviso antes do inicio do evento (em minutos).
TownWarTimeBeforeStart = 1

# Define todas as cidades como Zona de Guerra.
# Se True, a opcao TownWarTownId sera ignorada e todas as cidades viram zona de PvP.
TownWarAllTowns = False

# ID da cidade que sera zona de guerra durante o evento:
#
# 1:  Dark Elf Village
# 2:  Talking Island
# 3:  Elven Village
# 4:  Orc Village
# 5:  Gludin Town
# 6:  Dwarven Village
# 7:  Town of Gludio
# 8:  Town of Dion
# 9:  Giran Town
# 9:  Giran Harbour
# 10: Oren Town
# 11: Hunters Village
# 12: Town of Aden
# 13: Town of Goddard
# 14: Town of Rune
# 15: Heine
# 16: Floran Village
# 17: Town of Schuttgart
# 20: Kamael Village
# Padrao: 9 (Giran Town)
TownWarTownId = 11
TownWarTownName = Hunters Village

# Duracao do evento em minutos.
TownWarRunningTime = 10

# Recompensa dada ao jogador para cada morte durante o evento.
# ID do item e quantidade.
TownWarItemId = 57
TownWarItemAmount = 50000

# Desativa os Gatekeepers (NPCs de teleporte) durante o evento.
TownWarDisableGK = False
