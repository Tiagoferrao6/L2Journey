# ---------------------------------------------------------------------------
# Underground Coliseum (Coliseu Subterraneo)
# ---------------------------------------------------------------------------
# Horario de inicio das batalhas (em formato cron).
# Padrao: 21:00 toda Sexta, Sabado e Domingo.
BattleStartTime = 0 21 * * 5,6,7

# Duracao do periodo de batalhas em horas.
# Padrao: 2
BattlePeriod = 2

# Anuncia no chat quando o evento comeca e termina.
# Padrao: False
AllowAnnouncements = False

# Tamanho minimo do grupo (party) para se registrar no evento.
# Padrao: 7
PartySize = 7

# Tempo de espera em segundos para ressuscitar apos morrer na arena.
# Padrao: 10
ResurrectionTime = 10
