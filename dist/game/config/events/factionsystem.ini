# ---------------------------------------------------------------------------
# Sistema de Faccoes (Bem vs Mal)
# ---------------------------------------------------------------------------
# Ativa o sistema de faccoes. Jogadores escolhem um lado e lutam entre si.
# Padrao: False
EnableFactionSystem = False

# Local onde todos os jogadores nascem ao criar personagem (x,y,z).
# Padrao: 85332,16199,-1252
StartingLocation = 85332,16199,-1252

# Local onde o NPC gerenciador de faccao aparece no mapa (x,y,z,heading).
# Padrao: 85712,15974,-1260,26808
ManagerSpawnLocation = 85712,15974,-1260,26808

# Local da base da faccao do Bem (x,y,z).
# Padrao: 45306,48878,-3058
GoodBaseLocation = 45306,48878,-3058

# Local da base da faccao do Mal (x,y,z).
# Padrao: -44037,-113283,-237
EvilBaseLocation = -44037,-113283,-237

# Nome do time do Bem.
# Padrao: Good
GoodTeamName = Good

# Nome do time do Mal.
# Padrao: Evil
EvilTeamName = Evil

# Cor do nome dos jogadores da faccao do Bem (em hexadecimal RGB).
# Padrao: 00FF00
GoodNameColor = 00FF00

# Cor do nome dos jogadores da faccao do Mal (em hexadecimal RGB).
# Padrao: 0000FF
EvilNameColor = 0000FF

# Ativa guardas de faccao. NPCs que atacam jogadores da faccao inimiga.
# O template do NPC precisa ter a faccao configurada como clan.
# Padrao: True
EnableFactionGuards = True

# Ao morrer, o jogador renasce na base da sua faccao.
# Padrao: True
RespawnAtFactionBase = True

# Ao escolher uma faccao, o jogador se torna Nobless automaticamente.
# Padrao: False
FactionAutoNobless = False

# Bloqueia o chat entre faccoes inimigas. Jogadores de faccoes opostas
# nao conseguem se comunicar por chat.
# Padrao: True
EnableFactionChat = True

# Bloqueia login quando uma faccao tem mais jogadores online que a outra.
# Serve para manter equilibrio entre os times.
# Padrao: True
BalanceOnlinePlayers = True

# Diferenca maxima de jogadores online entre as faccoes para permitir login.
# Funciona junto com a opcao acima.
# Padrao: 20
BalancePlayerExceedLimit = 20
