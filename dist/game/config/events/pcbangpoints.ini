# ---------------------------------------------------------------------------
# Evento PC Bang (Pontos PC Cafe)
# ---------------------------------------------------------------------------
# Para funcionar no cliente, adicione em l2.ini na secao [Localize]: UsePCBangPoint=true
# O ID dos pontos PC Cafe no sistema e -100.

# Ativa o sistema de pontos PC Cafe.
PcCafeEnabled = False

# Maximo de pontos PC Cafe que um jogador pode ter.
# Limitado pelo valor maximo de int.
MaxPcCafePoints = 200000

# Permite apenas jogadores com conta Premium ganharem pontos.
PcCafeOnlyPremium = False

# Modo retail: jogador ganha pontos por tempo online (nao por matar monstros).
# True = 10 pontos a cada 5 minutos estando online.
# False = pontos ganhos com base na exp ao matar monstros.
PcCafeRetailLike = True

# Tempo em milissegundos entre cada ganho de pontos no modo retail.
# Padrao retail: 300000 (5 minutos)
PcCafeRewardTime = 300000

# Quantidade de pontos ganhos a cada intervalo no modo retail.
AcquisitionPointsRetailLikePoints = 10

# Usa pontos aleatorios no ganho.
# Se ativado, os pontos serao aleatorios entre (pontos/2) e pontos.
AcquisitionPointsRandom = False

# Taxa de ganho de pontos quando o modo NAO e retail (baseado em exp).
# Formula: exp * 0.0001 * AcquisitionPointsRate
# Exemplo: com 1.0 = 10000 exp = 1 ponto PC Bang
# Com 2.0 = 10000 exp = 2 pontos PC Bang
# Com 0.5 = 5000 exp = 1 ponto PC Bang
AcquisitionPointsRate = 1.0

# Ativa a chance de ganhar o dobro de pontos.
DoublingAcquisitionPoints = True

# Chance em porcentagem de ganhar pontos em dobro.
# Funciona apenas quando DoublingAcquisitionPoints esta ativo.
# Padrao: 1 (%)
DoublingAcquisitionPointsChance = 1

# Recompensa pontos mesmo ao matar monstros que dao pouca exp.
# Ganha pontos se o jogador recebe exp e a formula daria 0.
RewardLowExpKills = False

# Chance em porcentagem de ganhar pontos ao matar monstros de baixa exp.
# Funciona apenas quando RewardLowExpKills esta ativo.
# Padrao: 50 (%)
RewardLowExpKillsChance = 50
