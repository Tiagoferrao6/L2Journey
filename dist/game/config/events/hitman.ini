# ---------------------------------------------------------------------------
# Evento Hitman (Assassino de Aluguel)
# ---------------------------------------------------------------------------
# Ativa o sistema de evento Hitman. Jogadores podem colocar recompensas
# na cabeca de outros jogadores para que alguem os mate.
# Padrao: False
HitmanEnabled = True

# O assassino recebe karma ao matar o alvo?
# Padrao: True
HitmanTakeKarma = False

# Numero maximo de contratos que cada jogador pode criar ao mesmo tempo.
# Padrao: 5
HitmanTargetsLimit = 5

# Anuncia para todo o servidor quando alguem coloca uma recompensa?
# Padrao: False
HitmanAnnounce = False

# Numero maximo de alvos mostrados por pagina na lista de contratos.
# Padrao: 20
HitmanMaxPerPage = 20

# IDs dos itens aceitos como pagamento da recompensa (separados por virgula).
# Adena = 57
# Coin of Luck = 4037
# Life Stone = 9143
# Padrao: 57,3470
HitmanCurrency = 57,3470

# Valor minimo da recompensa para criar um contrato.
# Padrao: 100000
HitmanMinBounty = 100000

# Permite assassinar membros do mesmo Clan ou Alianca?
# Padrao: False
HitmanSameTeam = False

# Intervalo em minutos para salvar a lista de alvos no banco de dados.
# Padrao: 15
HitmanSaveInterval = 15
