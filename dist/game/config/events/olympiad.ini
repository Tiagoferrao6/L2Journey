# ---------------------------------------------------------------------------
# Configuracoes da Olympiad
# ---------------------------------------------------------------------------
# Os valores padrao sao iguais ao servidor oficial (retail).
# Se voce alterar qualquer configuracao, o servidor vai ficar diferente do oficial.
# Aviso:
# Tenha muito cuidado ao alterar qualquer coisa.
# Entenda o que esta mudando antes de aplicar em um servidor em producao.
# ---------------------------------------------------------------------------

# Ativa o sistema de Olympiad.
# Padrao: True
OlympiadEnabled = True

# Hora de inicio da Olympiad em formato militar (24h). Padrao 18 = 18:00.
# Padrao: 18
OlympiadStartTime = 18

# Minutos da hora de inicio. 00 = comeca no inicio da hora.
# Padrao: 00
OlympiadMin = 00

# Numero maximo de buffs que um jogador pode ter na Olympiad.
# Padrao: 5
OlympiadMaxBuffs = 5

# Periodo de competicao da Olympiad em milissegundos. Padrao 6 horas.
# (Se mudar, deve ser incremento de 10 minutos)
# Padrao: 21600000
OlympiadCPeriod = 21600000

# Duracao de cada batalha da Olympiad em milissegundos. Padrao 5 minutos.
# Padrao: 300000
OlympiadBattle = 300000

# Periodo semanal da Olympiad em milissegundos. Padrao 1 semana.
# Usado para adicionar pontos aos nobres a cada semana.
# Padrao: 604800000
OlympiadWPeriod = 604800000

# Periodo de validacao da Olympiad em milissegundos. Padrao 24 horas.
# Padrao: 86400000
OlympiadVPeriod = 86400000

# Pontos iniciais ao se tornar Noblesse pela primeira vez.
# Padrao: 10
OlympiadStartPoints = 10

# Pontos dados toda semana para jogadores Noblesse.
# Padrao: 10
OlympiadWeeklyPoints = 10

# Numero minimo de participantes necessarios para lutas por classe.
# Padrao: 11
OlympiadClassedParticipants = 5

# Numero minimo de participantes necessarios para lutas sem classe (qualquer classe).
# Padrao: 11
OlympiadNonClassedParticipants = 9

# Numero minimo de participantes necessarios para lutas em time 3x3.
# Padrao: 6
OlympiadTeamsParticipants = 6

# Numero usado para exibir quantidade de registrados nas mensagens.
# Mostra "Menos que..." ou "Mais que..." esse numero.
# 0 = mostra o numero exato (estilo antigo).
# Padrao: 100
OlympiadRegistrationDisplayNumber = 100

# Recompensa para lutas por classe.
# Formato: idItem1,quantidade1;idItem2,quantidade2...
# Padrao: 13722,50
OlympiadClassedReward = 13722,50

# Recompensa para lutas sem classe.
# Formato: idItem1,quantidade1;idItem2,quantidade2...
# Padrao: 13722,40
OlympiadNonClassedReward = 13722,40

# Recompensa para lutas em time 3x3.
# Formato: idItem1,quantidade1;idItem2,quantidade2...
# Padrao: 13722,85
OlympiadTeamReward = 13722,85

# ID do item usado para trocar pontos de Olympiad por recompensas.
# Padrao: 13722
OlympiadCompRewItem = 13722

# Numero minimo de lutas que o jogador precisa participar para receber pontos.
# Padrao: 15
OlympiadMinMatchesForPoints = 15

# Taxa de conversao: quantos pontos de Olympiad valem cada item de recompensa.
# Padrao: 1000
OlympiadGPPerPoint = 1000

# Pontos Noblesse dados para jogadores que se tornam Heroi.
# Padrao: 200
OlympiadHeroPoints = 200

# Pontos Noblesse dados para jogadores no Rank 1.
# Padrao: 100
OlympiadRank1Points = 100

# Pontos Noblesse dados para jogadores no Rank 2.
# Padrao: 75
OlympiadRank2Points = 75

# Pontos Noblesse dados para jogadores no Rank 3.
# Padrao: 55
OlympiadRank3Points = 55

# Pontos Noblesse dados para jogadores no Rank 4.
# Padrao: 40
OlympiadRank4Points = 40

# Pontos Noblesse dados para jogadores no Rank 5.
# Padrao: 30
OlympiadRank5Points = 30

# Maximo de pontos que um jogador pode ganhar ou perder em uma luta.
# Padrao: 10
OlympiadMaxPoints = 10

# Mostra os vencedores do mes passado na tabela de Herois.
# True = mes anterior / False = status atual.
# Padrao: True
OlympiadShowMonthlyWinners = True

# NPCs gerenciadores da Olympiad anunciam o inicio de cada luta.
# Padrao: True
OlympiadAnnounceGames = True

# IDs de itens proibidos na Olympiad (separados por virgula, ex: 1,200,350).
# Itens equipados serao movidos para o inventario ao teleportar.
# Padrao: (vazio)
OlympiadRestrictedItems = 

# Desativa o uso de Blessed Spirit Shots na Olympiad.
# Padrao: False
OlympiadDisableBlessedSpiritShots = False

# Limite de enchant dos itens durante batalhas de Olympiad. -1 = sem limite.
# Padrao: -1
OlympiadEnchantLimit = -1

# Salva todas as lutas e resultados da Olympiad no arquivo olympiad.csv.
# Padrao: False
OlympiadLogFights = False

# Tempo de espera em segundos antes de teleportar para a arena.
# Padrao: 120
OlympiadWaitTime = 120

# Divisor de pontos para lutas por classe e sem classe.
# Usado no calculo de pontos ganhos/perdidos apos a luta.
# Padrao: 5, 5
OlympiadDividerClassed = 5
OlympiadDividerNonClassed = 5

# Numero maximo de lutas que um Noblesse pode participar por semana (total).
# Padrao: 70
OlympiadMaxWeeklyMatches = 70

# Numero maximo de lutas sem classe (qualquer classe) por semana.
# Padrao: 60
OlympiadMaxWeeklyMatchesNonClassed = 60

# Numero maximo de lutas por classe por semana.
# Padrao: 30
OlympiadMaxWeeklyMatchesClassed = 30

# Numero maximo de lutas em time 3x3 por semana.
# Padrao: 10
OlympiadMaxWeeklyMatchesTeam = 10


# ---------------------------------------------------------------------------
# Periodo personalizado da Olympiad
# ---------------------------------------------------------------------------
# Exemplo para Olympiad a cada 2 semanas:
# OlympiadUseCustomPeriodSettings = True
# OlympiadPeriod = WEEK
# OlympiadPeriodMultiplier = 2
# ---------------------------------------------------------------------------
# Ativa configuracoes de periodo personalizado da Olympiad.
# Padrao: False
OlympiadUseCustomPeriodSettings = False

# Tipo de intervalo entre duas Olympiads.
# Valores possiveis: MONTH, WEEK, DAY
# Padrao: MONTH
OlympiadPeriod = MONTH

# Multiplicador do periodo. Define a frequencia da Olympiad.
# Exemplo: se tipo = MONTH e multiplicador = 2, Olympiad acontece a cada 2 meses.
# Padrao: 1
# Nota: Se tipo = DAY, o multiplicador precisa ser >= 7!
OlympiadPeriodMultiplier = 1

# Dias da semana em que as competicoes acontecem.
# Padrao: 1,2,3,4,5,6,7 (DOMINGO,SEGUNDA,TERCA,QUARTA,QUINTA,SEXTA,SABADO)
OlympiadCompetitionDays = 1,2,3,4,5,6,7
