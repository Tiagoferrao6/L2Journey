# ---------------------------------------------------------------------------
# Sistema de Casamento (Wedding)
# ---------------------------------------------------------------------------
# Esse sistema precisa que o suporte a NPC customizado esteja ativo!
# CustomNpcTable = True em General.properties
# ---------------------------------------------------------------------------
# ID do NPC Wedding Manager: 50007
#
# Primeira parte - "Noivado"
# 1) De target no jogador que voce deseja noivar.
# 2) Use o comando de voz ".engage nomedoparceiro" e aperte enter.
# 3) Se o jogador alvo tiver voce na lista de amigos, aparecera um popup
#    com o pedido de noivado e uma mensagem no sistema.
# 4) Se o jogador aceitar, voces estarao noivos.
#
# Segunda parte - "Casamento"
# 1) Quando dois jogadores estao noivos, podem falar com a Andromeda,
#    a Sacerdotisa do Casamento na Hot Springs Guild House (regiao de Goddard).
#    (Pode ser necessario Formal Wear e Adena para pagar a taxa!)
# 2) Cada jogador fala com o NPC e faz o pedido de casamento.
# 3) Apos isso, fogos de artificio aparecem e os dois estarao casados.
#
# Depois do casamento, use o comando ".gotolove nomedoparceiro" para
# teleportar ate seu parceiro (pode haver taxa de teleporte).
#
# Para cancelar o Noivado/Casamento, use ".divorce nomedoparceiro".
#
# Se estiver casado, voce paga uma porcentagem da sua adena ao parceiro no divorcio.
#
# Se um jogador casado tentar noivar com outro, pode sofrer penalidade (se ativada abaixo).
# ---------------------------------------------------------------------------

# Ativa o sistema de casamento.
AllowWedding = True

# Quantidade de Adena necessaria para casar.
WeddingPrice = 250000000

# Ativa a punicao para jogadores que tentam noivar com outros estando casados.
WeddingPunishInfidelity = True

# [NAO UTILIZADO] Esta opcao existe no arquivo mas nao e verificada no codigo.
# O teleporte entre casados funciona sempre que o casamento esta ativo.
WeddingTeleport = True

# Quantidade de Adena cobrada para teleportar ate o parceiro.
WeddingTeleportPrice = 50000

# Tempo de espera em segundos antes de teleportar ao usar o comando.
WeddingTeleportDuration = 60

# Permite casamentos entre personagens do mesmo sexo.
WeddingAllowSameSex = False

# Exige que os jogadores usem Formal Wear (roupa formal) para casar.
WeddingFormalWear = True

# Porcentagem da Adena que um jogador paga ao outro no divorcio.
WeddingDivorceCosts = 20
