# ---------------------------------------------------------------------------
# Configuracoes de Rates (Multiplicadores)
# ---------------------------------------------------------------------------
# Multiplicador de experiencia (EXP) ao matar monstros.
RateXp = 1

# Multiplicador de pontos de skill (SP) ao matar monstros.
RateSp = 1

# Multiplicador de EXP quando em grupo (party).
RatePartyXp = 1

# Multiplicador de SP quando em grupo (party).
RatePartySp = 1

# Multiplicador de drop do sistema de Manor (agricultura de seeds/crops).
RateDropManor = 1

# Velocidade de reducao do Karma (pontos de crime por PK).
# Valores menores = karma some mais rapido. Ex: 0.2 = karma some 5x mais rapido.
# -1 = Usa o mesmo valor do RateXp (comportamento original do jogo).
# Padrao: -1
RateKarmaLost = 0.2

# Multiplicador de perda de EXP ao morrer com karma.
RateKarmaExpLost = 1

# Multiplicador do preco dos guardas de cerco (siege guards).
RateSiegeGuardsPrice = 1

# Multiplicador de recompensa de itens extraiveis (extractable items e skills).
# Padrao: 1
RateExtractable = 1.

# Multiplicador de ganho de pontos de confianca (Trust) em Hellbound.
# Hellbound e uma zona que evolui de nivel conforme jogadores matam monstros la.
# Usado no script HellboundEngine ao matar monstros que dao pontos positivos.
RateHellboundTrustIncrease = 1

# Multiplicador de perda de pontos de confianca (Trust) em Hellbound.
# Usado no script HellboundEngine ao matar monstros que dao pontos negativos.
RateHellboundTrustDecrease = 1

# ---------------------------------------------------------------------------
# Multiplicadores de Quest
# ---------------------------------------------------------------------------
# AVISO: Algumas quests precisam ser reescritas para que
# esses multiplicadores funcionem corretamente.

# Multiplicador de drop de itens de quest (chance e quantidade).
RateQuestDrop = 1

# Multiplicador de EXP recebido como recompensa de quest.
RateQuestRewardXP = 1

# Multiplicador de SP recebido como recompensa de quest.
RateQuestRewardSP = 1

# Multiplicador de Adena recebida como recompensa de quest.
RateQuestRewardAdena = 1

# Se ativado, usa multiplicadores separados por tipo de item (pocao, scroll, receita, material).
# Se desligado, usa apenas o multiplicador generico RateQuestReward para tudo.
# Padrao: False
UseQuestRewardMultipliers = False

# Multiplicador generico de recompensa de quest.
# Quando UseQuestRewardMultipliers = False, este valor e usado para todos os itens.
# Quando UseQuestRewardMultipliers = True, este valor e usado apenas para itens
# que nao se encaixam nos tipos especificos abaixo.
# Padrao: 1
RateQuestReward = 1

# Multiplicadores por tipo de item (so funcionam com UseQuestRewardMultipliers = True).
RateQuestRewardPotion = 1
RateQuestRewardScroll = 1
RateQuestRewardRecipe = 1
RateQuestRewardMaterial = 1

# Diferenca maxima de nivel entre jogador e monstro para ganhar EXP.
# Se a diferenca for maior que este valor, o jogador nao ganha EXP do monstro.
MonsterExpMaxLevelDifference = 11


# ---------------------------------------------------------------------------
# Rates de Drop de Itens
# ---------------------------------------------------------------------------
# ATENCAO: Se voce aumentar tanto a chance quanto a quantidade, o resultado
# sera multiplicado. Exemplo: quantidade 5x e chance 5x = resultado final 25x.

# Multiplicador de QUANTIDADE de itens dropados ao matar monstros normais.
DeathDropAmountMultiplier = 1

# Multiplicador de QUANTIDADE de itens obtidos com Spoil (skill de anao).
SpoilDropAmountMultiplier = 1

# Multiplicador de QUANTIDADE de ervas (herbs) dropadas por monstros.
HerbDropAmountMultiplier = 1

# Multiplicador de QUANTIDADE de itens dropados por Raid Bosses.
RaidDropAmountMultiplier = 1

# Multiplicador de CHANCE de drop de itens ao matar monstros normais.
DeathDropChanceMultiplier = 1

# Multiplicador de CHANCE de obter itens com Spoil.
SpoilDropChanceMultiplier = 1

# Multiplicador de CHANCE de drop de ervas (herbs).
HerbDropChanceMultiplier = 1

# Multiplicador de CHANCE de drop de itens de Raid Bosses.
RaidDropChanceMultiplier = 1

# Multiplicadores especificos por ID de item (tambem usado para Adena).
# Formato: idDoItem,multiplicador;idDoItem2,multiplicador2;...
# NAO coloque espacos entre os numeros.
# Exemplo para joias de Raid Boss com rate 1x: 6656,1;6657,1;6658,1;...
# Exemplo para desabilitar drop de Adventurer's Treasure Sack: 21747,0;21748,0;21749,0
# Padrao: 57,1 (57 = Adena)
DropAmountMultiplierByItemId = 57,1;6656,1;6657,1;6658,1;6659,1;6660,1;6661,1;6662,1;8191,1;10170,1;10314,1
DropChanceMultiplierByItemId = 57,1;21747,0;21748,0;21749,0

# Numero maximo de itens diferentes que um monstro pode dropar por vez.
# Itens com 100% de chance (sem multiplicadores) nao contam nesse limite
# e caem como drops extras.
# Grupos de drop com chance total acima de 100% podem ignorar esse limite.
DropMaxOccurrencesNormal = 2
DropMaxOccurrencesRaidboss = 7


# ---------------------------------------------------------------------------
# Penalidade de Drop por Diferenca de Nivel
# ---------------------------------------------------------------------------
# Estas configs controlam a reducao de drop quando o jogador tem nivel
# muito acima do monstro. Quanto maior a diferenca, menor a chance de drop.

# ADENA: Diferenca minima de nivel para comecar a reduzir o drop de adena.
# Ate essa diferenca, o drop de adena e normal (100%).
# Padrao: 8
DropAdenaMinLevelDifference = 8

# ADENA: Diferenca maxima de nivel. Acima disso, a chance fica no minimo.
# Padrao: 15
DropAdenaMaxLevelDifference = 15

# ADENA: Chance minima de drop (em %) quando a diferenca de nivel e maxima.
# O valor vai diminuindo de 100% ate esse valor conforme a diferenca aumenta.
# Exemplo: 10 = monstro tera apenas 10% de chance de dropar adena no pior caso.
# Padrao: 10
DropAdenaMinLevelGapChance = 10

# ITENS: Diferenca minima de nivel para comecar a reduzir o drop de itens.
# Ate essa diferenca, o drop de itens e normal (100%).
# Padrao: 5
DropItemMinLevelDifference = 5

# ITENS: Diferenca maxima de nivel. Acima disso, a chance fica no minimo.
# Padrao: 10
DropItemMaxLevelDifference = 10

# ITENS: Chance minima de drop (em %) quando a diferenca de nivel e maxima.
# Padrao: 10
DropItemMinLevelGapChance = 10

# Diferenca maxima de nivel para que itens de EVENTO possam dropar.
# Se o jogador tiver mais niveis acima do monstro do que esse valor,
# itens de evento nao caem.
# Padrao: 9
EventItemMaxLevelDifference = 9


# ---------------------------------------------------------------------------
# Sistema de Vitalidade (so funciona se EnableVitality estiver ativado)
# ---------------------------------------------------------------------------
# A vitalidade multiplica o EXP ganho. Existem 5 niveis (0 a 4).
# Nivel 0 = sem bonus. Os valores abaixo definem o multiplicador de cada nivel.
# CUIDADO: Esses valores se multiplicam com o rate do servidor!
# Exemplo: servidor 15x com vitalidade nivel 4 (3x) = 15 * 3 = 45x de EXP!

# Multiplicador de EXP no nivel de vitalidade 1 (padrao: 150% = 1.5)
RateVitalityLevel1 = 1.5

# Multiplicador de EXP no nivel de vitalidade 2 (padrao: 200% = 2.0)
RateVitalityLevel2 = 2.

# Multiplicador de EXP no nivel de vitalidade 3 (padrao: 250% = 2.5)
RateVitalityLevel3 = 2.5

# Multiplicador de EXP no nivel de vitalidade 4 (padrao: 300% = 3.0)
RateVitalityLevel4 = 3.

# Multiplicador de ganho de pontos de vitalidade ao matar monstros.
RateVitalityGain = 1.

# Multiplicador de perda de pontos de vitalidade ao matar monstros.
RateVitalityLost = 0.6

# Velocidade de recuperacao de vitalidade em zonas de paz.
# Exemplo: 2 = recupera 2x mais rapido em cidades.
RateRecoveryPeaceZone = 1.

# Velocidade de recuperacao de vitalidade enquanto offline.
# So funciona se RecoverVitalityOnReconnect estiver ativado.
# Exemplo: 4 = recupera 4x mais rapido quando deslogado.
RateRecoveryOnReconnect = 4.


# ---------------------------------------------------------------------------
# Drop de Jogadores ao Morrer (valores em PORCENTAGEM)
# ---------------------------------------------------------------------------
# Estas opcoes controlam se jogadores perdem itens ao morrer.
# Valores 0 = jogadores nunca perdem itens ao morrer.

# Limite maximo de itens que um jogador pode dropar ao morrer (sem karma).
PlayerDropLimit = 0

# Chance geral (%) de dropar algo ao morrer (sem karma).
PlayerRateDrop = 0

# Chance (%) de dropar um item individual do inventario ao morrer.
PlayerRateDropItem = 0

# Chance (%) de dropar um equipamento (armadura/acessorio) ao morrer.
PlayerRateDropEquip = 0

# Chance (%) de dropar uma arma ao morrer.
PlayerRateDropEquipWeapon = 0

# ---------------------------------------------------------------------------
# Drop de Jogadores com Karma (PK - Player Killer)
# ---------------------------------------------------------------------------
# Jogadores com karma (que mataram outros jogadores) tem penalidades de drop
# mais severas. Estes valores se aplicam quando o jogador morre com karma.

# Limite maximo de itens que um jogador com karma pode dropar.
# Padrao: 10
KarmaDropLimit = 10

# Chance geral (%) de dropar algo ao morrer com karma.
# Padrao: 40
KarmaRateDrop = 40

# Chance (%) de dropar um item individual do inventario.
# Padrao: 50
KarmaRateDropItem = 50

# Chance (%) de dropar um equipamento (armadura/acessorio).
# Padrao: 40
KarmaRateDropEquip = 40

# Chance (%) de dropar uma arma.
# Padrao: 10
KarmaRateDropEquipWeapon = 10


# ---------------------------------------------------------------------------
# Pets (Multiplicadores para bichos de estimacao)
# ---------------------------------------------------------------------------

# Multiplicador de EXP de pets.
PetXpRate = 1

# Multiplicador de consumo de comida dos pets.
# Valores maiores = pet consome mais comida. Valores menores = consome menos.
PetFoodRate = 1

# Multiplicador de EXP do Sin Eater (pet que absorve karma do dono).
SinEaterXpRate = 1


# ---------------------------------------------------------------------------
# Drops Extras de Raid Bosses (nao inclui Grand Boss)
# ---------------------------------------------------------------------------
# Sistema customizado que adiciona itens extras ao drop de Raid Bosses.

# Se ativado, Raid Bosses droparao itens extras definidos na lista abaixo.
BossDropEnable = False

# Nivel minimo do Raid Boss para receber os drops extras.
BossDropMinLevel = 40

# Nivel maximo do Raid Boss para receber os drops extras.
BossDropMaxLevel = 999

# Lista de itens extras para Raid Bosses.
# Formato: idDoItem,quantidadeMinima,quantidadeMaxima,chance(%);idDoItem2,...
# A chance de drop tambem pode ser aumentada por nivel VIP, runas, etc.
# Exemplo abaixo: Gold Einhasad (4356), minimo 1, maximo 2, 100% de chance.
BossDropList = 4356,1,2,100;
