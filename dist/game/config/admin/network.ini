# ---------------------------------------------------------------------------------------------------------------------------------
# Configuracoes Gerais de Rede
# ---------------------------------------------------------------------------------------------------------------------------------

# Tempo (em segundos) que o servidor aguarda os pacotes serem finalizados ao desligar.
# Padrao: 5
ShutdownWaitTime = 5

# Se ativado, permite que pacotes descartaveis sejam jogados fora quando a fila esta cheia.
# Evita acumulo de pacotes e uso excessivo de memoria em situacoes de sobrecarga.
# Padrao: True
DropPackets = True

# Limite de pacotes na fila antes de comecar a descartar.
# Valores maiores permitem mais pacotes enfileirados antes do descarte,
# mas consomem mais memoria. Valores menores descartam mais cedo.
# Padrao: 250
DropPacketThreshold = 2500


# ---------------------------------------------------------------------------------------------------------------------------------
# Configuracoes de Threads (Processamento Paralelo)
# ---------------------------------------------------------------------------------------------------------------------------------

# Numero de threads para processar pacotes de rede.
# Mais threads = mais pacotes processados ao mesmo tempo, mas usa mais recursos.
# 0 = Automatico (usa o numero de nucleos do processador x 4).
# Padrao: 0
ThreadPoolSize = 0

# Prioridade das threads de rede no sistema operacional.
# De 1 (menor prioridade) a 10 (maior prioridade).
# 5 e uma prioridade media, suficiente para a maioria dos servidores.
# Padrao: 5
ThreadPriority = 5


# ---------------------------------------------------------------------------------------------------------------------------------
# Configuracoes de Buffers de Rede (Memoria para Pacotes)
# ---------------------------------------------------------------------------------------------------------------------------------
# Buffers sao blocos de memoria reutilizaveis que armazenam pacotes de rede.
# Ter buffers pre-alocados melhora a performance porque evita criar e destruir
# memoria a cada pacote enviado/recebido.
# Cada pool (grupo) e otimizado para um tamanho diferente de pacote.

# Tamanho dos segmentos para buffers dinamicos.
# Usado para aumentar o tamanho de buffers conforme necessario.
# Padrao: 64
BufferSegmentSize = 64

# Se ativado, os pools de buffers crescem automaticamente quando ficam cheios.
# Padrao: True
BufferPool.AutoExpandCapacity = True

# Fator de pre-inicializacao dos pools de buffers.
# Valor maior = mais buffers criados ao iniciar o servidor (usa mais memoria no inicio).
# 0 = Nenhuma pre-inicializacao (buffers criados sob demanda).
# Padrao: 0
BufferPool.InitFactor = 0

# Pool de buffers vazios. Usado para pacotes de rede sem conteudo.
# Padrao: 100 buffers de 2 bytes cada.
BufferPool.Empty.Size = 100
BufferPool.Empty.BufferSize = 2

# Pool de buffers minimos. Usado para pacotes muito pequenos.
# Padrao: 100 buffers de 64 bytes cada.
BufferPool.Minimum.Size = 100
BufferPool.Minimum.BufferSize = 64

# Pool de buffers muito pequenos.
# Padrao: 75 buffers de 128 bytes cada.
BufferPool.VerySmall.Size = 75
BufferPool.VerySmall.BufferSize = 128

# Pool de buffers pequenos.
# Padrao: 75 buffers de 256 bytes cada.
BufferPool.Small.Size = 75
BufferPool.Small.BufferSize = 256

# Pool de buffers pequenos-medios.
# Padrao: 75 buffers de 512 bytes cada.
BufferPool.LargeSmall.Size = 75
BufferPool.LargeSmall.BufferSize = 512

# Pool de buffers medios-pequenos.
# Padrao: 50 buffers de 1024 bytes cada.
BufferPool.SmallMedium.Size = 50
BufferPool.SmallMedium.BufferSize = 1024

# Pool de buffers medios.
# Padrao: 50 buffers de 2048 bytes cada.
BufferPool.Medium.Size = 50
BufferPool.Medium.BufferSize = 2048

# Pool de buffers medios-grandes.
# Padrao: 50 buffers de 4096 bytes cada.
BufferPool.LargeMedium.Size = 50
BufferPool.LargeMedium.BufferSize = 4096

# Pool de buffers grandes-pequenos.
# Padrao: 25 buffers de 8192 bytes cada.
BufferPool.SmallLarge.Size = 25
BufferPool.SmallLarge.BufferSize = 8192

# Pool de buffers grandes.
# Padrao: 25 buffers de 16384 bytes cada.
BufferPool.Large.Size = 25
BufferPool.Large.BufferSize = 16384

# Pool de buffers muito grandes.
# Padrao: 25 buffers de 24576 bytes cada.
BufferPool.VeryLarge.Size = 25
BufferPool.VeryLarge.BufferSize = 24576

# Pool de buffers maximo. Usado para os maiores pacotes de rede possiveis.
# Padrao: 10 buffers de 32768 bytes cada.
BufferPool.Maximum.Size = 10
BufferPool.Maximum.BufferSize = 32768
