# ---------------------------------------------------------------------------
# Gerenciador de IDs (Identificadores Unicos)
# ---------------------------------------------------------------------------
# IMPORTANTE: Estas configuracoes NAO devem ser alteradas com o servidor ligado.
# O sistema de IDs controla a criacao de numeros unicos para cada objeto do jogo
# (personagens, itens, NPCs, etc). Configuracoes erradas podem corromper o servidor.
# ---------------------------------------------------------------------------

# Se ativado, faz uma limpeza no banco de dados ao iniciar o servidor.
# Remove dados orfaos (itens de personagens excluidos, dados de clas invalidos, etc).
# Um banco de dados grande pode deixar a inicializacao mais lenta com isso ligado.
# Recomendado manter ligado para manter o banco saudavel.
# Padrao: True
DatabaseCleanUp = True

# ID inicial do intervalo de IDs disponiveis para objetos do jogo.
# Este valor define onde comeca a numeracao de IDs.
# Nao altere a menos que saiba exatamente o que esta fazendo.
# Padrao: 268435456 (0x10000000)
FirstObjectId = 268435456

# ID final do intervalo de IDs disponiveis para objetos do jogo.
# Este valor define o limite maximo da numeracao de IDs.
# O valor maximo (2147483647) e o limite de um numero inteiro de 32 bits.
# Padrao: 2147483647 (0x7FFFFFFF)
LastObjectId = 2147483647

# Capacidade inicial da tabela que rastreia os IDs usados e livres.
# Um valor maior usa mais memoria no inicio, mas evita que a tabela
# precise ser expandida com frequencia durante o uso do servidor.
# Padrao: 100000
InitialCapacity = 100000

# Porcentagem de uso que dispara a expansao automatica da tabela de IDs.
# Quando a quantidade de IDs usados atinge essa porcentagem, a tabela cresce.
# O valor vai de 0 a 1 (exemplo: 0.9 = 90% de uso).
# Padrao: 0.9
ResizeThreshold = 0.9

# Fator de crescimento quando a tabela de IDs precisa ser expandida.
# Exemplo: 1.1 significa que a tabela cresce 10% a cada expansao.
# Padrao: 1.1
ResizeMultiplier = 1.1
