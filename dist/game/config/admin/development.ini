# ---------------------------------------------------------------------------
# Configuracoes de Desenvolvimento
# ---------------------------------------------------------------------------
# NAO MEXA NESTAS OPCOES SE VOCE NAO SABE O QUE ESTA FAZENDO.
# Estas configuracoes sao APENAS para debug/testes. NAO use em servidores em producao.

# Ativa o modo desenvolvedor. Habilita logs extras de debug no codigo.
# Uso atual limitado (ex: logs de erros SQL no sistema DressMe).
# Padrao: False
Developer = False

# Se ativado, mostra no console detalhes sobre o cache de acoes HTML dos NPCs
# (quais bypasses e links foram armazenados). Util para debugar problemas
# com dialogos de NPC que nao respondem a cliques.
# Padrao: False
HtmlActionCacheDebug = False

# Se ativado, o servidor NAO carrega nenhuma quest nem script.
# Acelera muito a inicializacao para testes onde quests nao sao necessarias.
# Padrao: False
NoQuests = False

# Se ativado, o servidor NAO cria nenhum spawn de NPC/monstro no mundo.
# Acelera a inicializacao para testes onde mobs nao sao necessarios.
# Padrao: False
NoSpawns = False

# Se ativado, mostra no console o nome de cada quest conforme ela e carregada.
# Gera muitas linhas no log (uma por quest). Util para encontrar quests com erro.
# Padrao: False
ShowQuestLoadInLogs = False

# Se ativado, mostra no console o nome de cada script conforme ele e carregado.
# Similar ao anterior, mas para scripts que nao sao quests.
# Padrao: False
ShowScriptLoadInLogs = False

# Se ativado, registra no log todos os pacotes recebidos do cliente (jogador).
# Gera MUITO volume de log. Use apenas para diagnosticar problemas de rede.
# Padrao: False
DebugClientPackets = False

# Se ativado, registra no log os pacotes "Ex" (extended) recebidos do cliente.
# Pacotes Ex sao um tipo especial com IDs secundarios.
# Padrao: False
DebugExClientPackets = False

# Se ativado, registra no log todos os pacotes enviados do servidor para o cliente.
# Gera MUITO volume de log.
# Padrao: False
DebugServerPackets = False

# Se ativado, registra no log pacotes desconhecidos recebidos do cliente.
# So funciona quando DebugClientPackets ou DebugExClientPackets estao ativados.
# Padrao: True
DebugUnknownPackets = True

# Lista de pacotes que serao IGNORADOS no debug (nao aparecem no log).
# Separe os nomes por virgula. Util para filtrar pacotes muito frequentes
# que poluiriam o log (ex: movimentacao, atualizacao de status).
ExcludedPacketList = AbnormalStatusUpdate, AcquireSkillList, Attack, AutoAttackStart, AutoAttackStop, DeleteObject, ExAutoSoulShot, ExPacket, ExStorageMaxCount, ExUserInfoAbnormalVisualEffect, ExUserInfoEquipSlot, MoveToLocation, NpcInfo, NpcSay, SkillCoolTime, SocialAction, StatusUpdate, UserInfo, ValidatePosition
