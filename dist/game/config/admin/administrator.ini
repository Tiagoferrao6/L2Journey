# ---------------------------------------------------------------------------
# Administrador
# ---------------------------------------------------------------------------
# Todo personagem criado tera nivel de acesso maximo (admin).
# Todos os jogadores terao poderes de administrador.
# Padrao: False
EverybodyHasAdminRights = False

# Se ativado, apenas contas com acesso GM podem entrar no servidor.
# Jogadores normais nao conseguem logar.
# Padrao: False
ServerGMOnly = False

# GMs ganham a aura brilhante de Heroi ao logar.
# Nota: GMs podem usar "//hero" para ativar a aura manualmente.
# Recomendado manter desligado pois pode causar lag grafico.
# Padrao: False
GMHeroAura = False

# GMs entram no jogo em modo oculto (builder hide).
# Ficam invisiveis, invulneraveis e com mensagens privadas bloqueadas.
# IMPORTANTE: Quando ativo, ignora as opcoes de Invulnerable, Invisible,
# Silence, DietMode e AutoList abaixo, pois o builder hide ja inclui tudo.
# Padrao: True
GMStartupBuilderHide = False

# GMs entram no jogo invulneraveis (nao tomam dano).
# So funciona se GMStartupBuilderHide estiver desligado.
# Padrao: False
GMStartupInvulnerable = True

# GMs entram no jogo invisiveis (ninguem os ve).
# So funciona se GMStartupBuilderHide estiver desligado.
# Padrao: False
GMStartupInvisible = True

# GMs entram no jogo com mensagens privadas bloqueadas.
# So funciona se GMStartupBuilderHide estiver desligado.
# Padrao: False
GMStartupSilence = False

# GMs aparecem na lista publica de GMs online (/gmlist).
# Se desligado, GMs ficam ocultos na lista.
# So funciona se GMStartupBuilderHide estiver desligado.
# Padrao: False
GMStartupAutoList = False

# GMs entram no jogo no modo dieta (sem penalidade de peso).
# So funciona se GMStartupBuilderHide estiver desligado.
# Padrao: False
GMStartupDietMode = True

# GMs seguem as mesmas restricoes de itens que jogadores normais.
# Se desligado, GMs podem usar qualquer item sem restricao de classe ou nivel.
# Padrao: True
GMItemRestriction = True

# GMs seguem as mesmas restricoes de skills que jogadores normais.
# Se desligado, GMs podem usar qualquer skill sem restricao.
# Padrao: True
GMSkillRestriction = True

# GMs podem dropar e trocar itens que normalmente sao restritos
# (itens nao-tradeaveis e itens de quest).
# Padrao: False
GMTradeRestrictedItems = False

# GMs podem fazer logout ou restart mesmo estando em combate.
# Padrao: True
GMRestartFighting = True

# Mostra o nome do GM no final do anuncio.
# Exemplo: "Anuncio: ola (NomeDoGM)"
# Padrao: False
GMShowAnnouncerName = False

# GMs recebem skills especiais de GM automaticamente ao logar.
# Skills: 7029, 7041-7064, 7088-7096, 23238-23249 (Master's Blessing)
# Padrao: False
GMGiveSpecialSkills = False

# GMs recebem skills especiais de aura automaticamente ao logar.
# Skills: 7029, 23238-23249, 23253-23296 (Master's Blessing)
# Padrao: False
GMGiveSpecialAuraSkills = False

# Quando um GM abre um dialogo de NPC, o caminho do arquivo HTML
# aparece no chat. Util para encontrar e editar os arquivos de dialogo.
# Padrao: True
GMDebugHtmlPaths = True

# O comando //gmspeed usa o sistema antigo (skill Super Haste).
# Se desligado, usa o sistema novo com valores de 0 a 10.
# Padrao: False
UseSuperHasteAsGMSpeed = False


# ---------------------------------------------------------------------------
# Moderacao de Chat
# ---------------------------------------------------------------------------
# Se ativado, libera os comandos de voz .banchat e .unbanchat
# para jogadores com nivel de acesso adequado (padrao: 100).
# Consulte access_levels.sql e admin_command_access_rights para detalhes.
# Padrao: True
ChatAdmin = True
