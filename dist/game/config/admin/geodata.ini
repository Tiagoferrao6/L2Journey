# ---------------------------------------------------------------------------
# GeoData (Dados Geograficos do Mapa)
# ---------------------------------------------------------------------------

# Sistema de busca de caminho (pathfinding).
# Calcula rotas para NPCs e monstros se desviarem de obstaculos.
# 0 = Desligado (NPCs andam em linha reta, ignorando obstaculos)
# 1 = Ligado usando arquivos de pathnode (pre-calculados)
# 2 = Ligado calculando rotas em tempo real a partir do geodata
# Padrao: 0
PathFinding = 0

# Pasta onde ficam os arquivos de pathnode (usado quando PathFinding = 1).
# Padrao: data/pathnode
PathnodeDirectory = data/pathnode

# Configuracao dos buffers de memoria usados pelo pathfinding.
# Formato: tamanhoXquantidade separados por ponto-e-virgula.
# Quanto maiores os buffers, mais longas as rotas que podem ser calculadas.
# Nao mexa se nao souber o que esta fazendo.
PathFindBuffers = 100x6;128x6;192x6;256x4;320x4;384x4;500x2

# Pasta onde ficam os arquivos de geodata do mapa (.l2j).
# O geodata contem informacoes de terreno, paredes e obstaculos do mundo.
geodataPath = ./data/geodata

# Se ativado, carrega o conteudo dos arquivos geodata na memoria fisica (RAM).
# Melhora a performance mas usa mais memoria.
# Se desligado, o sistema operacional decide se mantem na RAM ou nao.
# Padrao: True
ForceGeoData = True

# ---------------------------------------------------------------------------
# Pesos do Pathfinding (ajuste fino do calculo de rotas)
# Valores menores = caminho preferido. Valores maiores = caminho evitado.
# ---------------------------------------------------------------------------

# Peso para caminhos livres (sem obstaculos e longe de paredes).
# Quanto menor, mais o sistema prefere caminhos abertos.
LowWeight = 0.5

# Peso para caminhos perto de paredes.
# Faz o sistema evitar andar rente a paredes quando possivel.
MediumWeight = 2

# Peso para caminhos com obstaculos.
# Faz o sistema evitar ao maximo passar por areas com obstaculos.
HighWeight = 3

# Se ativado, o calculo de rotas diagonais fica mais inteligente,
# mas usa mais CPU. Recomendado manter ligado para rotas mais naturais.
AdvancedDiagonalStrategy = True

# Peso para movimentos diagonais. So funciona com AdvancedDiagonalStrategy ligado.
# Padrao: LowWeight * raiz de 2 (aproximadamente 0.707)
DiagonalWeight = 0.707

# Numero maximo de passadas do filtro de linha de visao (LOS) apos calcular a rota.
# Remove pontos desnecessarios da rota para torna-la mais reta e natural.
# 0 = Desliga o filtro (rotas ficam mais "quadradas").
# Padrao: 3
MaxPostfilterPasses = 3

# Modo de debug visual do pathfinding.
# Mostra itens no chao representando a rota calculada:
# - Adena = pontos conhecidos pelo pathfinder
# - Antidotes = caminho construido
# - Pocoes vermelhas = pontos finais da rota
# - Pocoes verdes = pontos removidos pelo filtro de linha de visao
# APENAS PARA TESTES. Nunca use em servidor em producao.
# Padrao: False
DebugPath = False

# Controla como as coordenadas do jogador sao sincronizadas entre cliente e servidor.
# -1 = Sincroniza apenas a altura (Z). Padrao quando nao ha geodata.
# 1 = Servidor confia nas coordenadas do cliente. Dificulta players de ultrapassar obstaculos.
# 2 = Para uso com geodata ativo. Servidor valida e corrige posicao se o cliente se afastar demais.
# Padrao: -1
CoordSynchronize = -1

# ---------------------------------------------------------------------------
# Carregamento de Regioes do Mapa
# ---------------------------------------------------------------------------

# Se ativado, tenta carregar todas as regioes do mapa mesmo que nao estejam
# listadas abaixo. Se o arquivo nao existir, a regiao e simplesmente ignorada.
# Se desligado, carrega APENAS as regioes listadas abaixo como True.
tryLoadUnspecifiedRegions = True

# Lista de regioes especificas para carregar ou ignorar.
# Use o formato: XX_YY=True (carregar) ou XX_YY=False (ignorar)
# Exemplos:
# 22_22=True   (regiao obrigatoria, servidor nao inicia sem ela)
# 19_20=True   (regiao obrigatoria)
# 25_26=False  (regiao ignorada, nao sera carregada)
